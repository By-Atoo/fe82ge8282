<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #000000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* Фоновое видео (превью, зациклено) */
        .bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            filter: brightness(0.85) contrast(1.1);
        }

        /* === МЕНЮ (ГОЛОСОВОЕ СООБЩЕНИЕ) — полностью чёрное, вверху === */
        .voice-message-container {
            position: absolute;
            top: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            pointer-events: none;
        }

        .voice-card {
            background: #000000;          /* полностью чёрный фон */
            border-radius: 60px;
            padding: 12px 24px 12px 20px;
            display: inline-flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.15);
            pointer-events: auto;
            border: 1px solid #222;
            transition: transform 0.1s ease, background 0.2s;
            cursor: pointer;              /* вся менюшка кликабельна */
        }
        .voice-card:active {
            transform: scale(0.97);
            background: #111;
        }

        /* Кнопка play (иконка внутри) — остаётся, но клик идёт от родителя */
        .play-btn {
            margin-left: auto
            background: transparent;
            border: none;
            padding: 0;
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;   /* клик перехватывается родителем */
        }
        .play-btn img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
        }

        /* Эквалайзер — белые полоски, чаще и динамичнее */
        .equalizer {
            margin-left: auto;
            position: relative;
            width: 100px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .eq-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 0.9;
            filter: brightness(1.2);
        }
        .animated-bars {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;      /* чаще — увеличили количество полосок и уменьшили расстояние */
            height: 100%;
            width: 100%;
            pointer-events: none;
        }
        .bar {
            width: 2px;
            background: #ffffff;     /* полностью белые */
            border-radius: 2px;
            transition: height 0.06s linear;
            box-shadow: 0 0 5px rgba(255,255,255,0.6);
        }

        /* Текст подсказки (мелкий, внизу меню) */
        .hint {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            margin-top: 8px;
            text-align: center;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* === ЭКРАН СКРИМЕРА === */
        .screamer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .screamer-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* КНОПКА "НАЗАД" — ведёт на другую страницу */
        .back-button {
            position: absolute;
            bottom: 35px;
            left: 0;
            right: 0;
            text-align: center;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 12px 20px;
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            font-family: monospace;
            cursor: pointer;
            z-index: 10001;
            width: fit-content;
            margin: 0 auto;
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.4);
            transition: 0.2s;
            text-decoration: none;
            display: inline-block;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
        }
        .back-button:hover {
            background: rgba(0,0,0,0.9);
            border-color: white;
        }

        /* Фолбэк для звука */
        .sound-fallback {
            position: absolute;
            bottom: 25%;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.9);
            color: #ffaa44;
            text-align: center;
            padding: 14px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            backdrop-filter: blur(8px);
            cursor: pointer;
            z-index: 10002;
            border: 1px solid #ffaa44;
            display: none;
        }

        /* Адаптация под мобильные */
        @media (max-width: 600px) {
            .voice-card {
                padding: 8px 18px 8px 14px;
                gap: 12px;
            }
            .play-btn {
                width: 44px;
                height: 44px;
            }
            .equalizer {
                width: 110px;
                height: 40px;
            }
            .bar {
                width: 3px;
            }
            .animated-bars {
                gap: 4px;
            }
            .back-button {
                font-size: 0.9rem;
                padding: 8px 16px;
                bottom: 25px;
            }
        }
    </style>
</head>
<body>

    <!-- Фоновое зацикленное видео -->
    <video class="bg-video" id="bgVideo" autoplay muted loop playsinline>
        <source src="https://cdn.jsdelivr.net/gh/By-Atoo/fe82ge8282@main/.res/vid.mp4" type="video/mp4">
    </video>

    <!-- МЕНЮ (полностью чёрное, кликабельное, вверху) -->
    <div class="voice-message-container">
        <div class="voice-card" id="voiceCard">
            <div class="play-btn">
                <img src="https://cdn.jsdelivr.net/gh/By-Atoo/fe82ge8282@main/.res/play.png" alt="play">
            </div>
            <div class="equalizer">
                <img class="eq-bg" src="https://cdn.jsdelivr.net/gh/By-Atoo/fe82ge8282@main/.res/ekv.png" alt="eq">
                <div class="animated-bars" id="animatedBars">
                    <!-- 12 белых полосок для более частого визуала -->
                </div>
            </div>
        </div>
        <div class="hint"></div>
    </div>

    <!-- СКРИМЕР (видео + звук) -->
    <div class="screamer-overlay" id="screamerOverlay">
        <video class="screamer-video" id="screamerVideo" loop muted playsinline>
            <source src="https://cdn.jsdelivr.net/gh/By-Atoo/fe82ge8282@main/.res/gif.mp4" type="video/mp4">
        </video>
        <div class="sound-fallback" id="soundFallback">
            🔊 НАЖМИТЕ ЗДЕСЬ, ЧТОБЫ ВКЛЮЧИТЬ ЗВУК 🔊
        </div>
        <!-- КНОПКА НАЗАД -->
        <a href="https://by-atoo.github.io/fe82ge8282/index.html" class="back-button" id="backButton">← Назад</a>
    </div>

    <script>
        (function() {
            const SCREAM_VIDEO_URL = 'https://cdn.jsdelivr.net/gh/By-Atoo/fe82ge8282@main/.res/gif.mp4';
            const SCREAM_SOUND_URL = 'https://cdn.jsdelivr.net/gh/By-Atoo/fe82ge8282@main/.res/sound.mp3';
            
            const bgVideo = document.getElementById('bgVideo');
            const voiceCard = document.getElementById('voiceCard');       // вся менюшка кликабельна
            const screamerOverlay = document.getElementById('screamerOverlay');
            const screamerVideo = document.getElementById('screamerVideo');
            const soundFallback = document.getElementById('soundFallback');
            
            let screamAudio = null;
            let screamerActive = false;
            let soundAllowed = false;
            let animationInterval = null;
            
            // ---- АНИМАЦИЯ ЭКВАЛАЙЗЕРА (белые полоски, частое обновление) ----
            function startEqAnimation() {
                if (animationInterval) clearInterval(animationInterval);
                const bars = document.querySelectorAll('.bar');
                if (!bars.length) return;
                
                // обновляем каждые 70 мс для более частых изменений
                animationInterval = setInterval(() => {
                    bars.forEach(bar => {
                        // высота от 5px до 38px (более динамично)
                        const randomHeight = Math.floor(Math.random() * 34) + 5;
                        bar.style.height = randomHeight + 'px';
                        // оставляем белый цвет, но с разной яркостью
                        const brightness = 0.6 + (randomHeight / 45);
                        bar.style.backgroundColor = `rgb(255, 255, 255)`;
                        bar.style.boxShadow = `0 0 ${4 + randomHeight / 10}px rgba(255,255,255,0.8)`;
                    });
                }, 65);
            }
            
            function stopEqAnimation() {
                if (animationInterval) {
                    clearInterval(animationInterval);
                    animationInterval = null;
                }
                const bars = document.querySelectorAll('.bar');
                bars.forEach(bar => {
                    bar.style.height = '10px';
                    bar.style.backgroundColor = '#ffffff';
                    bar.style.boxShadow = '0 0 4px rgba(255,255,255,0.5)';
                });
            }
            
            // Стартуем анимацию эквалайзера сразу
            startEqAnimation();
            
            // ---- ЗАПУСК СКРИМЕРА (полноэкранное видео + звук) ----
            async function launchScreamer() {
                if (screamerActive) return;
                screamerActive = true;
                
                // Останавливаем фоновое видео
                if (bgVideo) {
                    bgVideo.pause();
                    bgVideo.style.opacity = '0';
                }
                
                // Скрываем меню (голосовое сообщение)
                const voiceContainer = document.querySelector('.voice-message-container');
                if (voiceContainer) voiceContainer.style.display = 'none';
                
                // Показываем оверлей скримера
                screamerOverlay.style.display = 'flex';
                
                // Загружаем и запускаем видео скримера (зациклено)
                screamerVideo.src = SCREAM_VIDEO_URL;
                screamerVideo.load();
                await screamerVideo.play().catch(e => console.warn("Video error:", e));
                
                // Создаём аудио для скримера
                screamAudio = new Audio(SCREAM_SOUND_URL);
                screamAudio.volume = 1.0;
                screamAudio.loop = false;
                screamAudio.preload = 'auto';
                
                const playSound = () => {
                    if (!screamAudio) return;
                    screamAudio.play().then(() => {
                        soundAllowed = true;
                        if (soundFallback) soundFallback.style.display = 'none';
                    }).catch(err => {
                        console.warn("Audio blocked:", err);
                        soundFallback.style.display = 'block';
                        const enableHandler = (e) => {
                            if (soundAllowed) return;
                            screamAudio.play().then(() => {
                                soundAllowed = true;
                                soundFallback.style.display = 'none';
                                document.removeEventListener('click', enableHandler);
                                screamerOverlay.removeEventListener('click', enableHandler);
                            }).catch(() => {});
                        };
                        document.addEventListener('click', enableHandler);
                        screamerOverlay.addEventListener('click', enableHandler);
                    });
                };
                playSound();
                
                // Запрос полноэкранного режима
                try {
                    if (document.documentElement.requestFullscreen) {
                        await document.documentElement.requestFullscreen();
                    } else if (document.documentElement.webkitRequestFullscreen) {
                        document.documentElement.webkitRequestFullscreen();
                    }
                } catch (e) {}
            }
            
            // ---- ОБРАБОТЧИК НА ВСЮ МЕНЮШКУ (клик по voiceCard) ----
            voiceCard.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                
                // Виброотклик
                if (navigator.vibrate) navigator.vibrate(50);
                
                // Останавливаем анимацию эквалайзера
                stopEqAnimation();
                
                // Запускаем скример
                launchScreamer();
            });
            
            // ---- ОБРАБОТЧИК ДЛЯ FALLBACK (звук) ----
            if (soundFallback) {
                soundFallback.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (screamAudio && !soundAllowed) {
                        screamAudio.play().then(() => {
                            soundAllowed = true;
                            soundFallback.style.display = 'none';
                        }).catch(err => console.log);
                    }
                });
            }
            
            // Предзагрузка ресурсов скримера
            const preloadVideo = document.createElement('video');
            preloadVideo.preload = 'auto';
            preloadVideo.src = SCREAM_VIDEO_URL;
            preloadVideo.load();
            
            const preloadAudio = new Audio();
            preloadAudio.preload = 'auto';
            preloadAudio.src = SCREAM_SOUND_URL;
            
            // Обработка возможной ошибки фонового видео
            if (bgVideo) {
                bgVideo.play().catch(e => console.log("Фоновое видео не запустилось автоматически"));
            }
            
            // Дополнительно: если пользователь кликнет по оверлею скримера (не по кнопке назад) - включить звук при необходимости
            screamerOverlay.addEventListener('click', (e) => {
                if (screamerActive && screamAudio && !soundAllowed && e.target !== document.getElementById('backButton')) {
                    screamAudio.play().then(() => {
                        soundAllowed = true;
                        if (soundFallback) soundFallback.style.display = 'none';
                    }).catch(() => {});
                }
            });
        })();
    </script>
</body>
</html>
