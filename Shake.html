<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Змейка — яркая версия с яблоком | Мобильная адаптация</title>
    <style>
        * {
            user-select: none;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #f9e45b 0%, #ffb347 40%, #ff8c42 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 16px;
            font-family: 'Segoe UI', 'Courier New', system-ui, -apple-system, monospace;
        }

        .game-container {
            background: #f2e8c9;
            border-radius: 56px;
            padding: 16px 20px 20px 20px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3), inset 0 1px 4px rgba(255,255,200,0.8);
            backdrop-filter: blur(0px);
        }

        .game-panel {
            background: #faf0cf;
            border-radius: 32px;
            padding: 14px;
            box-shadow: inset 0 0 0 2px #fff9e8, 0 8px 18px rgba(0,0,0,0.2);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 0 0 5px #ffda88, 0 10px 25px rgba(0,0,0,0.3);
            background-color: #d9f0b6;
            cursor: pointer;
            width: 100%;
            height: auto;
        }

        /* адаптация холста — сохраняем квадрат */
        .canvas-wrapper {
            display: flex;
            justify-content: center;
        }

        .info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 18px;
            margin-bottom: 12px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .score-box {
            background: #2b2b1f;
            padding: 6px 20px;
            border-radius: 60px;
            color: #ffea9e;
            font-weight: bold;
            font-size: 28px;
            letter-spacing: 2px;
            text-shadow: 0 2px 0 #5a3a1a;
            box-shadow: inset 0 1px 4px #ffd966, 0 5px 10px black;
            font-family: monospace;
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .score-label {
            font-size: 18px;
            color: #ffe0a3;
            font-weight: 600;
        }

        .restart-btn {
            background: #ffb347;
            border: none;
            font-size: 20px;
            font-weight: bold;
            padding: 8px 24px;
            border-radius: 80px;
            font-family: inherit;
            color: #2c1c0a;
            cursor: pointer;
            transition: 0.08s linear;
            box-shadow: 0 5px 0 #b4621a;
            letter-spacing: 1px;
        }

        .restart-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #b4621a;
        }

        .status {
            text-align: center;
            margin: 8px auto 10px auto;
            font-size: 18px;
            font-weight: bold;
            background: #000000aa;
            backdrop-filter: blur(6px);
            width: fit-content;
            padding: 6px 20px;
            border-radius: 40px;
            color: #ffecb3;
        }

        /* МОБИЛЬНЫЕ СЕНСОРНЫЕ КНОПКИ */
        .touch-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
            gap: 12px;
        }

        .arrow-row {
            display: flex;
            justify-content: center;
            gap: 25px;
        }

        .ctrl-btn {
            background: #fee3a0;
            border: none;
            font-size: 36px;
            font-weight: bold;
            padding: 12px 22px;
            border-radius: 60px;
            box-shadow: 0 6px 0 #b97f2e;
            transition: 0.05s linear;
            cursor: pointer;
            touch-action: manipulation;
            color: #5a3a1a;
            text-align: center;
            min-width: 80px;
            font-family: monospace;
            background: #ffe5b4;
        }

        .ctrl-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #b97f2e;
        }

        @media (max-width: 550px) {
            .ctrl-btn {
                font-size: 28px;
                padding: 10px 18px;
                min-width: 70px;
            }
            .arrow-row {
                gap: 15px;
            }
            .score-box {
                font-size: 22px;
                padding: 4px 16px;
            }
            .restart-btn {
                font-size: 18px;
                padding: 6px 18px;
            }
            .status {
                font-size: 14px;
            }
        }

        @media (max-width: 450px) {
            .ctrl-btn {
                font-size: 24px;
                padding: 8px 14px;
                min-width: 60px;
            }
        }

        .controls-note {
            text-align: center;
            margin-top: 12px;
            font-size: 13px;
            color: #3a2a12;
            background: #ffefb0d0;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            padding: 5px 14px;
            border-radius: 50px;
            font-weight: 500;
        }

        footer {
            text-align: center;
            font-size: 11px;
            color: #9b7a42;
            margin-top: 14px;
            font-weight: 500;
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <div class="game-panel">
            <div class="canvas-wrapper">
                <canvas id="snakeCanvas" width="400" height="400" style="width: 100%; height: auto; max-width: 500px; aspect-ratio: 1 / 1;"></canvas>
            </div>
            <div class="info">
                <div class="score-box">
                    <span class="score-label">🍎 СЧЁТ</span>
                    <span id="scoreValue">0</span>
                </div>
                <button class="restart-btn" id="restartButton">⟳ НОВАЯ</button>
            </div>
            <div id="gameStatus" class="status">▶ ИГРА АКТИВНА</div>
            
            <!-- Сенсорные кнопки для мобильных устройств -->
            <div class="touch-controls">
                <div class="arrow-row">
                    <button class="ctrl-btn" data-dir="UP">▲</button>
                </div>
                <div class="arrow-row">
                    <button class="ctrl-btn" data-dir="LEFT">◀</button>
                    <button class="ctrl-btn" data-dir="DOWN">▼</button>
                    <button class="ctrl-btn" data-dir="RIGHT">▶</button>
                </div>
            </div>
            <div class="controls-note">
                🎮 Стрелки клавиатуры / кнопки на экране
            </div>
            <footer>🐍 Съешь яркое яблочко — становись длиннее!</footer>
        </div>
    </div>
</div>

<script>
    (function(){
        // ----- НАСТРОЙКИ -----
        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreValue');
        const statusDiv = document.getElementById('gameStatus');
        
        // Размеры игрового поля
        const GRID_SIZE = 20;       // 20x20
        let CELL_SIZE = canvas.width / GRID_SIZE; // 20px (но может пересчитаться при ресайзе, но canvas фикс 400)
        
        // Данные игры
        let snake = [];
        let food = { x: 12, y: 12 };
        let direction = 'RIGHT';
        let nextDirection = 'RIGHT';
        let score = 0;
        let gameRunning = true;
        let gameLoopId = null;
        let gameSpeed = 110;        // мс на шаг
        let lastMoveTime = 0;
        
        // Изображение яблока (внешнее)
        let appleImage = new Image();
        let appleLoaded = false;
        // Оптимальный размер текстуры: рекомендуем 32x32 или 40x40 пикселей (с прозрачностью PNG)
        // Ссылка на яблоко от пользователя:
        const APPLE_URL = 'https://raw.githubusercontent.com/By-Atoo/fe82ge8282/main/.res/apple.png';
        
        // Загружаем изображение яблока
        appleImage.crossOrigin = "Anonymous"; // может понадобиться, если CORS, но raw.githubusercontent обычно отдаёт корректно
        appleImage.onload = () => {
            appleLoaded = true;
            drawGame(); // перерисовываем после загрузки
        };
        appleImage.onerror = () => {
            console.warn("Не удалось загрузить яблоко по URL, используем fallback (круг)");
            appleLoaded = false;
            drawGame();
        };
        appleImage.src = APPLE_URL;
        
        // ---------- ИНИЦИАЛИЗАЦИЯ ----------
        function initGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = 'RIGHT';
            nextDirection = 'RIGHT';
            score = 0;
            gameRunning = true;
            updateScoreUI();
            statusDiv.innerHTML = '▶ ИГРА АКТИВНА';
            statusDiv.style.color = '#ffecb3';
            statusDiv.style.background = '#000000aa';
            generateValidFood();
            drawGame();
        }
        
        // Генерация еды в свободной клетке
        function isPartOfSnake(x, y) {
            return snake.some(seg => seg.x === x && seg.y === y);
        }
        
        function generateValidFood() {
            const maxAttempts = 5000;
            for(let i = 0; i < maxAttempts; i++) {
                const randX = Math.floor(Math.random() * GRID_SIZE);
                const randY = Math.floor(Math.random() * GRID_SIZE);
                if(!isPartOfSnake(randX, randY)) {
                    food = { x: randX, y: randY };
                    return;
                }
            }
            // Если почти всё поле занято — поищем вручную
            for(let y = 0; y < GRID_SIZE; y++) {
                for(let x = 0; x < GRID_SIZE; x++) {
                    if(!isPartOfSnake(x, y)) {
                        food = { x, y };
                        return;
                    }
                }
            }
            // Победа! Нет свободных клеток
            gameWin();
        }
        
        function updateScoreUI() {
            scoreSpan.innerText = score;
        }
        
        // Движение змейки (возвращает true если игра продолжается)
        function moveSnake() {
            if(!gameRunning) return false;
            
            // Разрешаем новое направление (запрет разворота)
            let newDir = nextDirection;
            if((newDir === 'RIGHT' && direction === 'LEFT') ||
               (newDir === 'LEFT' && direction === 'RIGHT') ||
               (newDir === 'UP' && direction === 'DOWN') ||
               (newDir === 'DOWN' && direction === 'UP')) {
                newDir = direction;
            }
            direction = newDir;
            
            // Новая голова
            let newHead = { ...snake[0] };
            switch(direction) {
                case 'RIGHT': newHead.x += 1; break;
                case 'LEFT':  newHead.x -= 1; break;
                case 'UP':    newHead.y -= 1; break;
                case 'DOWN':  newHead.y += 1; break;
            }
            
            const willEat = (newHead.x === food.x && newHead.y === food.y);
            
            // Вставляем голову
            snake.unshift(newHead);
            if(!willEat) {
                snake.pop();
            } else {
                // съели яблоко
                score++;
                updateScoreUI();
                generateValidFood();
            }
            
            // Проверка столкновений
            const head = snake[0];
            // Стены
            if(head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                gameOver('Стена! 💥 Игра окончена');
                return false;
            }
            // Столкновение с собой
            for(let i = 1; i < snake.length; i++) {
                if(snake[i].x === head.x && snake[i].y === head.y) {
                    gameOver('Врезались в себя! 🐍 Game Over');
                    return false;
                }
            }
            return true;
        }
        
        function gameOver(reason) {
            if(!gameRunning) return;
            gameRunning = false;
            statusDiv.innerHTML = `💀 ${reason} 💀`;
            statusDiv.style.color = '#ffbb77';
            statusDiv.style.background = '#5e1f1fcc';
            if(gameLoopId) {
                cancelAnimationFrame(gameLoopId);
                gameLoopId = null;
            }
            drawGame(); // финальный рендер
        }
        
        function gameWin() {
            if(!gameRunning) return;
            gameRunning = false;
            statusDiv.innerHTML = '🏆 ПОБЕДА! ПОЛЕ ЗАПОЛНЕНО! 🏆';
            statusDiv.style.color = '#f9f3b0';
            statusDiv.style.background = '#2f6b2fcc';
            if(gameLoopId) {
                cancelAnimationFrame(gameLoopId);
                gameLoopId = null;
            }
            drawGame();
        }
        
        // ------ ОТРИСОВКА (яркий фон, текстура яблока) ------
        function drawGame() {
            if(!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Яркий фон поля (сочная трава)
            ctx.fillStyle = '#b8f080';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Рисуем яркую сетку
            ctx.strokeStyle = '#d6ff96';
            ctx.lineWidth = 1.2;
            for(let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }
            
            // Рисуем яблоко (изображение или fallback)
            const drawFood = () => {
                const fx = food.x * CELL_SIZE;
                const fy = food.y * CELL_SIZE;
                const size = CELL_SIZE;
                if(appleLoaded && appleImage.complete && appleImage.naturalWidth > 0) {
                    // Рисуем текстуру яблока с небольшим отступом для красоты
                    const padding = 2;
                    ctx.drawImage(appleImage, fx + padding, fy + padding, size - padding*2, size - padding*2);
                } else {
                    // Fallback: яркое красно-оранжевое яблоко с бликом
                    ctx.fillStyle = '#ff4d4d';
                    ctx.shadowBlur = 3;
                    ctx.beginPath();
                    ctx.arc(fx + size/2, fy + size/2, size/2 - 2, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = '#f9e05e';
                    ctx.beginPath();
                    ctx.arc(fx + size/2 - 3, fy + size/2 - 3, 2, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = '#5e8c3a';
                    ctx.beginPath();
                    ctx.moveTo(fx + size/2 + 2, fy + size/2 - 8);
                    ctx.lineTo(fx + size/2 + 7, fy + size/2 - 14);
                    ctx.lineTo(fx + size/2 - 2, fy + size/2 - 10);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            };
            
            // Рисуем еду
            drawFood();
            
            // Рисуем змейку (яркая, с градиентом)
            for(let i = 0; i < snake.length; i++) {
                const seg = snake[i];
                const x = seg.x * CELL_SIZE;
                const y = seg.y * CELL_SIZE;
                const pad = i === 0 ? 1 : 2;
                const radius = 5;
                // Градиент для тела
                const grad = ctx.createLinearGradient(x, y, x+CELL_SIZE, y+CELL_SIZE);
                if(i === 0) {
                    grad.addColorStop(0, '#78e865');
                    grad.addColorStop(1, '#47b53c');
                } else {
                    grad.addColorStop(0, '#56d44b');
                    grad.addColorStop(1, '#32942a');
                }
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.roundRect(x + 1, y + 1, CELL_SIZE - 2, CELL_SIZE - 2, radius);
                ctx.fill();
                ctx.strokeStyle = '#1f771a';
                ctx.lineWidth = 1.2;
                ctx.beginPath();
                ctx.roundRect(x + 1, y + 1, CELL_SIZE - 2, CELL_SIZE - 2, radius);
                ctx.stroke();
                
                // Глаза (голова)
                if(i === 0) {
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(x + CELL_SIZE - 6, y + 7, 3, 0, Math.PI*2);
                    ctx.arc(x + 6, y + 7, 3, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = '#000000';
                    ctx.beginPath();
                    ctx.arc(x + CELL_SIZE - 6.5, y + 6, 1.5, 0, Math.PI*2);
                    ctx.arc(x + 5.5, y + 6, 1.5, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(x + CELL_SIZE - 7.2, y + 5, 0.8, 0, Math.PI*2);
                    ctx.arc(x + 4.8, y + 5, 0.8, 0, Math.PI*2);
                    ctx.fill();
                }
            }
            
            // Декоративные блики на фоне (небольшие точки)
            ctx.fillStyle = '#fff9c4';
            for(let i=0; i<60; i++) {
                // случайные "искры"
            }
        }
        
        // roundRect для canvas
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x+r, y);
                this.lineTo(x+w-r, y);
                this.quadraticCurveTo(x+w, y, x+w, y+r);
                this.lineTo(x+w, y+h-r);
                this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
                this.lineTo(x+r, y+h);
                this.quadraticCurveTo(x, y+h, x, y+h-r);
                this.lineTo(x, y+r);
                this.quadraticCurveTo(x, y, x+r, y);
                return this;
            };
        }
        
        // ---------- ИГРОВОЙ ЦИКЛ ----------
        function gameTick(now) {
            if(!gameRunning) {
                drawGame();
                if(gameLoopId) {
                    cancelAnimationFrame(gameLoopId);
                    gameLoopId = null;
                }
                return;
            }
            
            if(!lastMoveTime) {
                lastMoveTime = now;
                requestAnimationFrame(gameTick);
                drawGame();
                return;
            }
            
            const elapsed = now - lastMoveTime;
            if(elapsed >= gameSpeed) {
                const success = moveSnake();
                lastMoveTime = now;
                drawGame();
                if(!success) {
                    if(gameLoopId) {
                        cancelAnimationFrame(gameLoopId);
                        gameLoopId = null;
                    }
                    drawGame();
                    return;
                }
            }
            drawGame();
            gameLoopId = requestAnimationFrame(gameTick);
        }
        
        function startGameLoop() {
            if(gameLoopId) cancelAnimationFrame(gameLoopId);
            lastMoveTime = 0;
            gameRunning = true;
            gameLoopId = requestAnimationFrame(gameTick);
        }
        
        // ----- УПРАВЛЕНИЕ (клавиатура + сенсорные кнопки) -----
        function setDirection(newDir) {
            if(!gameRunning) return;
            switch(newDir) {
                case 'UP': if(direction !== 'DOWN') nextDirection = 'UP'; break;
                case 'DOWN': if(direction !== 'UP') nextDirection = 'DOWN'; break;
                case 'LEFT': if(direction !== 'RIGHT') nextDirection = 'LEFT'; break;
                case 'RIGHT': if(direction !== 'LEFT') nextDirection = 'RIGHT'; break;
            }
        }
        
        function handleKeydown(e) {
            const key = e.key;
            if(!gameRunning) return;
            let mapped = null;
            if(key === 'ArrowUp') mapped = 'UP';
            else if(key === 'ArrowDown') mapped = 'DOWN';
            else if(key === 'ArrowLeft') mapped = 'LEFT';
            else if(key === 'ArrowRight') mapped = 'RIGHT';
            if(mapped) {
                e.preventDefault();
                setDirection(mapped);
            }
        }
        
        // Рестарт
        function restartGame() {
            if(gameLoopId) {
                cancelAnimationFrame(gameLoopId);
                gameLoopId = null;
            }
            initGame();
            direction = 'RIGHT';
            nextDirection = 'RIGHT';
            gameRunning = true;
            lastMoveTime = 0;
            drawGame();
            startGameLoop();
        }
        
        // ---------- МОБИЛЬНЫЕ КНОПКИ ----------
        function attachTouchControls() {
            const btns = document.querySelectorAll('.ctrl-btn');
            btns.forEach(btn => {
                const dir = btn.getAttribute('data-dir');
                if(!dir) return;
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    setDirection(dir);
                });
                // также блокируем touchstart, чтобы не было задержки
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    setDirection(dir);
                });
            });
        }
        
        // ----- АДАПТАЦИЯ РАЗМЕРА (чтобы канвас корректно отображался на мобильных) -----
        function resizeCanvas() {
            // canvas имеет фиксированные 400x400, но CSS масштабирует, координаты мыши не нужны. 
            // Просто пересчитаем CELL_SIZE для отрисовки, если вдруг понадобится. Но canvas.width и height 400.
            CELL_SIZE = canvas.width / GRID_SIZE; // всегда 20
            drawGame();
        }
        
        // инициализация
        window.addEventListener('load', () => {
            initGame();
            startGameLoop();
            attachTouchControls();
            window.addEventListener('keydown', handleKeydown);
            document.getElementById('restartButton').addEventListener('click', () => restartGame());
            window.addEventListener('resize', () => resizeCanvas());
            resizeCanvas();
            // Предотвращаем скролл при касании canvas
            canvas.addEventListener('touchstart', (e) => { e.preventDefault(); });
        });
        
        // Доп. сообщение о разрешении текстуры:
        console.log("🍎 Рекомендация: оптимальное разрешение для текстуры яблока — 32x32 или 40x40 пикселей (PNG с прозрачностью). Текущая текстура загружена с URL.");
    })();
</script>
</body>
</html>
