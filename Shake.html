<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Змейка | Свайпы + кнопки + настройка сетки</title>
    <style>
        * {
            user-select: none;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb4d);
            background-size: 400% 400%;
            animation: auroraFlow 12s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', system-ui, monospace;
            padding: 16px;
        }

        @keyframes auroraFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Контейнер игры — максимальная ширина, но с отступами */
        .game-wrapper {
            max-width: 1000px;
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 56px;
            padding: 16px;
            backdrop-filter: blur(4px);
            box-shadow: 0 25px 40px rgba(0,0,0,0.5);
        }

        .game-panel {
            background: rgba(25, 20, 15, 0.7);
            border-radius: 48px;
            padding: 20px;
            backdrop-filter: blur(2px);
        }

        /* Верхняя панель: счёт и настройки */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
            flex-wrap: wrap;
        }

        .score-box {
            background: #000000aa;
            backdrop-filter: blur(8px);
            padding: 8px 24px;
            border-radius: 60px;
            color: #fff0b5;
            font-weight: bold;
            font-size: 36px;
            letter-spacing: 2px;
            font-family: monospace;
            display: flex;
            align-items: baseline;
            gap: 12px;
            border: 1px solid #ffdd88;
        }

        .score-label {
            font-size: 24px;
            color: #ffe6aa;
        }

        /* Настройка размера сетки */
        .grid-control {
            display: flex;
            gap: 12px;
            background: #00000088;
            backdrop-filter: blur(8px);
            padding: 6px 18px;
            border-radius: 60px;
            align-items: center;
        }

        .grid-control span {
            color: #ffecb3;
            font-weight: bold;
            font-size: 18px;
        }

        .grid-btn {
            background: #ffb347;
            border: none;
            font-size: 20px;
            font-weight: bold;
            width: 44px;
            height: 44px;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 3px 0 #9b551a;
            transition: 0.05s linear;
            color: #2c1c0a;
        }

        .grid-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #9b551a;
        }

        .grid-value {
            font-size: 24px;
            font-weight: bold;
            color: #ffefb0;
            min-width: 50px;
            text-align: center;
        }

        /* Холст — увеличенный (800x800) */
        .canvas-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 32px;
            box-shadow: 0 0 0 6px #ffecb3, 0 15px 30px black;
            background-color: #1e3a1a;
            width: 100%;
            height: auto;
            cursor: pointer;
        }

        /* Кнопка рестарт — на всю ширину */
        .restart-container {
            width: 100%;
            margin: 15px 0 15px 0;
        }

        .restart-btn {
            background: #ffb347;
            border: none;
            font-size: 26px;
            font-weight: bold;
            padding: 14px 0;
            width: 100%;
            border-radius: 80px;
            font-family: inherit;
            color: #2c1c0a;
            cursor: pointer;
            transition: 0.08s linear;
            box-shadow: 0 6px 0 #9b551a;
            letter-spacing: 2px;
            text-align: center;
        }

        .restart-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #9b551a;
        }

        /* Панель сенсорных кнопок (стрелки) */
        .touch-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            margin-top: 5px;
        }

        .arrow-row {
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .ctrl-btn {
            background: #fee3a0;
            border: none;
            font-size: 44px;
            font-weight: bold;
            padding: 12px 28px;
            border-radius: 70px;
            box-shadow: 0 7px 0 #b97f2e;
            transition: 0.05s linear;
            cursor: pointer;
            touch-action: manipulation;
            color: #5a3a1a;
            text-align: center;
            min-width: 90px;
            font-family: monospace;
        }

        .ctrl-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #b97f2e;
        }

        /* Статус игры (мини-иконка) */
        .status {
            text-align: center;
            margin-top: 12px;
            font-size: 28px;
            font-weight: bold;
            background: #000000aa;
            backdrop-filter: blur(8px);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            padding: 4px 28px;
            border-radius: 60px;
            color: #ffeaac;
            letter-spacing: 1px;
        }

        /* Адаптация под мобильные */
        @media (max-width: 650px) {
            .ctrl-btn {
                font-size: 32px;
                padding: 10px 20px;
                min-width: 70px;
            }
            .arrow-row {
                gap: 18px;
            }
            .score-box {
                font-size: 28px;
                padding: 4px 18px;
            }
            .score-label {
                font-size: 20px;
            }
            .grid-btn {
                width: 38px;
                height: 38px;
                font-size: 18px;
            }
            .restart-btn {
                font-size: 22px;
                padding: 10px 0;
            }
        }

        @media (max-width: 480px) {
            .ctrl-btn {
                font-size: 28px;
                padding: 8px 16px;
                min-width: 60px;
            }
            .top-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .grid-control {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-panel">
        <!-- Верхняя панель: счёт и настройки сетки -->
        <div class="top-bar">
            <div class="score-box">
                <span class="score-label">🍎</span>
                <span id="scoreValue">0</span>
            </div>
            <div class="grid-control">
                <span>📐</span>
                <button class="grid-btn" id="gridMinus">−</button>
                <span id="gridSizeDisplay" class="grid-value">20</span>
                <button class="grid-btn" id="gridPlus">+</button>
            </div>
        </div>

        <!-- Увеличенный холст (800x800) -->
        <div class="canvas-wrapper">
            <canvas id="snakeCanvas" width="800" height="800"></canvas>
        </div>

        <!-- Кнопка рестарт на всю ширину -->
        <div class="restart-container">
            <button class="restart-btn" id="restartButton">⟳ НОВАЯ ИГРА</button>
        </div>

        <!-- Сенсорные кнопки управления -->
        <div class="touch-controls">
            <div class="arrow-row">
                <button class="ctrl-btn" data-dir="UP">▲</button>
            </div>
            <div class="arrow-row">
                <button class="ctrl-btn" data-dir="LEFT">◀</button>
                <button class="ctrl-btn" data-dir="DOWN">▼</button>
                <button class="ctrl-btn" data-dir="RIGHT">▶</button>
            </div>
        </div>

        <!-- Статус игры (иконка) -->
        <div id="gameStatus" class="status">▶</div>
    </div>
</div>

<script>
    (function(){
        // ----- ЭЛЕМЕНТЫ -----
        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreValue');
        const statusDiv = document.getElementById('gameStatus');
        const gridSizeDisplay = document.getElementById('gridSizeDisplay');
        
        // ----- ПЕРЕМЕННЫЕ ИГРЫ -----
        let GRID_SIZE = 20;          // по умолчанию 20x20
        let CELL_SIZE = canvas.width / GRID_SIZE; // 800 / 20 = 40px
        
        let snake = [];
        let food = { x: 12, y: 12 };
        let direction = 'RIGHT';
        let nextDirection = 'RIGHT';
        let score = 0;
        let gameRunning = true;
        let gameLoopId = null;
        let gameSpeed = 110;          // мс на шаг
        let lastMoveTime = 0;
        
        // Изображение яблока
        let appleImage = new Image();
        let appleLoaded = false;
        const APPLE_URL = 'https://raw.githubusercontent.com/By-Atoo/fe82ge8282/main/.res/apple.png';
        
        appleImage.onload = () => {
            appleLoaded = true;
            drawGame();
        };
        appleImage.onerror = () => {
            appleLoaded = false;
            drawGame();
        };
        appleImage.src = APPLE_URL;
        
        // ----- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ -----
        function updateCellSize() {
            CELL_SIZE = canvas.width / GRID_SIZE;
        }
        
        function isPartOfSnake(x, y) {
            return snake.some(seg => seg.x === x && seg.y === y);
        }
        
        function generateValidFood() {
            const maxAttempts = 5000;
            for(let i = 0; i < maxAttempts; i++) {
                const randX = Math.floor(Math.random() * GRID_SIZE);
                const randY = Math.floor(Math.random() * GRID_SIZE);
                if(!isPartOfSnake(randX, randY)) {
                    food = { x: randX, y: randY };
                    return;
                }
            }
            // Ручной поиск
            for(let y = 0; y < GRID_SIZE; y++) {
                for(let x = 0; x < GRID_SIZE; x++) {
                    if(!isPartOfSnake(x, y)) {
                        food = { x, y };
                        return;
                    }
                }
            }
            gameWin();
        }
        
        function updateScoreUI() {
            scoreSpan.innerText = score;
        }
        
        // Инициализация / сброс игры с текущим GRID_SIZE
        function initGame() {
            // Центральная стартовая позиция
            const center = Math.floor(GRID_SIZE / 2);
            snake = [
                { x: center, y: center },
                { x: center-1, y: center },
                { x: center-2, y: center }
            ];
            direction = 'RIGHT';
            nextDirection = 'RIGHT';
            score = 0;
            gameRunning = true;
            updateScoreUI();
            statusDiv.innerHTML = '▶';
            statusDiv.style.color = '#d4ffb0';
            generateValidFood();
            drawGame();
        }
        
        // Логика движения
        function moveSnake() {
            if(!gameRunning) return false;
            
            let newDir = nextDirection;
            if((newDir === 'RIGHT' && direction === 'LEFT') ||
               (newDir === 'LEFT' && direction === 'RIGHT') ||
               (newDir === 'UP' && direction === 'DOWN') ||
               (newDir === 'DOWN' && direction === 'UP')) {
                newDir = direction;
            }
            direction = newDir;
            
            let newHead = { ...snake[0] };
            switch(direction) {
                case 'RIGHT': newHead.x += 1; break;
                case 'LEFT':  newHead.x -= 1; break;
                case 'UP':    newHead.y -= 1; break;
                case 'DOWN':  newHead.y += 1; break;
            }
            
            const willEat = (newHead.x === food.x && newHead.y === food.y);
            snake.unshift(newHead);
            if(!willEat) {
                snake.pop();
            } else {
                score++;
                updateScoreUI();
                generateValidFood();
            }
            
            const head = snake[0];
            // Стены
            if(head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                gameOver('💀');
                return false;
            }
            // Столкновение с собой
            for(let i = 1; i < snake.length; i++) {
                if(snake[i].x === head.x && snake[i].y === head.y) {
                    gameOver('💀');
                    return false;
                }
            }
            return true;
        }
        
        function gameOver(reason) {
            if(!gameRunning) return;
            gameRunning = false;
            statusDiv.innerHTML = '💀';
            statusDiv.style.color = '#ffa07a';
            if(gameLoopId) {
                cancelAnimationFrame(gameLoopId);
                gameLoopId = null;
            }
            drawGame();
        }
        
        function gameWin() {
            if(!gameRunning) return;
            gameRunning = false;
            statusDiv.innerHTML = '🏆';
            statusDiv.style.color = '#ffd966';
            if(gameLoopId) {
                cancelAnimationFrame(gameLoopId);
                gameLoopId = null;
            }
            drawGame();
        }
        
        // ----- ОТРИСОВКА (с учётом CELL_SIZE) -----
        function drawGame() {
            if(!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Яркий фон поля
            ctx.fillStyle = '#b8f080';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Сетка
            ctx.strokeStyle = '#d6ff96';
            ctx.lineWidth = 1.5;
            for(let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }
            
            // Еда (яблоко)
            const fx = food.x * CELL_SIZE;
            const fy = food.y * CELL_SIZE;
            const size = CELL_SIZE;
            if(appleLoaded && appleImage.complete && appleImage.naturalWidth > 0) {
                const padding = Math.max(2, Math.floor(CELL_SIZE * 0.1));
                ctx.drawImage(appleImage, fx + padding, fy + padding, size - padding*2, size - padding*2);
            } else {
                // Fallback
                ctx.fillStyle = '#ff4d4d';
                ctx.shadowBlur = 2;
                ctx.beginPath();
                ctx.arc(fx + size/2, fy + size/2, size/2 - 3, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#f9e05e';
                ctx.beginPath();
                ctx.arc(fx + size/2 - 3, fy + size/2 - 4, 3, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#5e8c3a';
                ctx.beginPath();
                ctx.moveTo(fx + size/2 + 3, fy + size/2 - 9);
                ctx.lineTo(fx + size/2 + 8, fy + size/2 - 15);
                ctx.lineTo(fx + size/2 - 1, fy + size/2 - 11);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
            
            // Змейка
            for(let i = 0; i < snake.length; i++) {
                const seg = snake[i];
                const x = seg.x * CELL_SIZE;
                const y = seg.y * CELL_SIZE;
                const radius = Math.max(4, CELL_SIZE * 0.2);
                const grad = ctx.createLinearGradient(x, y, x+CELL_SIZE, y+CELL_SIZE);
                if(i === 0) {
                    grad.addColorStop(0, '#7ef86a');
                    grad.addColorStop(1, '#48c43b');
                } else {
                    grad.addColorStop(0, '#5fdf52');
                    grad.addColorStop(1, '#38a52c');
                }
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.roundRect(x + 2, y + 2, CELL_SIZE - 4, CELL_SIZE - 4, radius);
                ctx.fill();
                ctx.strokeStyle = '#1f771a';
                ctx.lineWidth = 1.8;
                ctx.beginPath();
                ctx.roundRect(x + 2, y + 2, CELL_SIZE - 4, CELL_SIZE - 4, radius);
                ctx.stroke();
                
                // Глаза для головы
                if(i === 0) {
                    const eyeSize = Math.max(2.5, CELL_SIZE * 0.1);
                    const eyeOffsetX = CELL_SIZE * 0.25;
                    const eyeOffsetY = CELL_SIZE * 0.3;
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(x + CELL_SIZE - eyeOffsetX, y + eyeOffsetY, eyeSize, 0, Math.PI*2);
                    ctx.arc(x + eyeOffsetX, y + eyeOffsetY, eyeSize, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = '#010101';
                    ctx.beginPath();
                    ctx.arc(x + CELL_SIZE - eyeOffsetX - 1, y + eyeOffsetY - 1, eyeSize*0.7, 0, Math.PI*2);
                    ctx.arc(x + eyeOffsetX - 1, y + eyeOffsetY - 1, eyeSize*0.7, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = 'white';
                    ctx.beginPath();
                    ctx.arc(x + CELL_SIZE - eyeOffsetX - 1.5, y + eyeOffsetY - 1.8, eyeSize*0.35, 0, Math.PI*2);
                    ctx.arc(x + eyeOffsetX - 1.5, y + eyeOffsetY - 1.8, eyeSize*0.35, 0, Math.PI*2);
                    ctx.fill();
                }
            }
        }
        
        // roundRect
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x+r, y);
                this.lineTo(x+w-r, y);
                this.quadraticCurveTo(x+w, y, x+w, y+r);
                this.lineTo(x+w, y+h-r);
                this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
                this.lineTo(x+r, y+h);
                this.quadraticCurveTo(x, y+h, x, y+h-r);
                this.lineTo(x, y+r);
                this.quadraticCurveTo(x, y, x+r, y);
                return this;
            };
        }
        
        // ----- ИГРОВОЙ ЦИКЛ -----
        function gameTick(now) {
            if(!gameRunning) {
                drawGame();
                if(gameLoopId) {
                    cancelAnimationFrame(gameLoopId);
                    gameLoopId = null;
                }
                return;
            }
            
            if(!lastMoveTime) {
                lastMoveTime = now;
                requestAnimationFrame(gameTick);
                drawGame();
                return;
            }
            
            const elapsed = now - lastMoveTime;
            if(elapsed >= gameSpeed) {
                const success = moveSnake();
                lastMoveTime = now;
                drawGame();
                if(!success) {
                    if(gameLoopId) {
                        cancelAnimationFrame(gameLoopId);
                        gameLoopId = null;
                    }
                    drawGame();
                    return;
                }
            }
            drawGame();
            gameLoopId = requestAnimationFrame(gameTick);
        }
        
        function startGameLoop() {
            if(gameLoopId) cancelAnimationFrame(gameLoopId);
            lastMoveTime = 0;
            gameRunning = true;
            gameLoopId = requestAnimationFrame(gameTick);
        }
        
        // ----- УПРАВЛЕНИЕ: СВАЙПЫ + КНОПКИ + КЛАВИАТУРА -----
        function setDirection(newDir) {
            if(!gameRunning) return;
            if((newDir === 'RIGHT' && direction !== 'LEFT') ||
               (newDir === 'LEFT' && direction !== 'RIGHT') ||
               (newDir === 'UP' && direction !== 'DOWN') ||
               (newDir === 'DOWN' && direction !== 'UP')) {
                nextDirection = newDir;
            }
        }
        
        // Свайпы
        let touchStart = null;
        function handleTouchStart(e) {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            touchStart = {
                x: touch.clientX - rect.left,
                y: touch.clientY - rect.top,
                time: Date.now()
            };
        }
        
        function handleTouchMove(e) {
            e.preventDefault();
            if(!touchStart || !gameRunning) return;
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const currentX = touch.clientX - rect.left;
            const currentY = touch.clientY - rect.top;
            const dx = currentX - touchStart.x;
            const dy = currentY - touchStart.y;
            if(Math.abs(dx) < 12 && Math.abs(dy) < 12) return;
            
            let newDir = null;
            if(Math.abs(dx) > Math.abs(dy)) {
                newDir = dx > 0 ? 'RIGHT' : 'LEFT';
            } else {
                newDir = dy > 0 ? 'DOWN' : 'UP';
            }
            if(newDir) setDirection(newDir);
            touchStart = null;
        }
        
        function handleTouchEnd(e) {
            e.preventDefault();
            touchStart = null;
        }
        
        // Клавиатура
        function handleKeydown(e) {
            if(!gameRunning) return;
            let mapped = null;
            if(e.key === 'ArrowUp') mapped = 'UP';
            else if(e.key === 'ArrowDown') mapped = 'DOWN';
            else if(e.key === 'ArrowLeft') mapped = 'LEFT';
            else if(e.key === 'ArrowRight') mapped = 'RIGHT';
            if(mapped) {
                e.preventDefault();
                setDirection(mapped);
            }
        }
        
        // ----- ИЗМЕНЕНИЕ РАЗМЕРА СЕТКИ (перезапуск) -----
        let availableSizes = [15, 20, 25, 30];
        let currentSizeIndex = 1; // 20 по умолчанию
        
        function setGridSize(newSize) {
            if(newSize === GRID_SIZE) return;
            GRID_SIZE = newSize;
            updateCellSize();
            gridSizeDisplay.innerText = GRID_SIZE;
            // Перезапуск игры с новыми параметрами
            if(gameLoopId) cancelAnimationFrame(gameLoopId);
            initGame();
            startGameLoop();
        }
        
        function changeGrid(delta) {
            let newVal = GRID_SIZE + delta;
            if(newVal >= 10 && newVal <= 40) {
                setGridSize(newVal);
            }
        }
        
        // ----- ПЕРЕЗАПУСК -----
        function restartGame() {
            if(gameLoopId) cancelAnimationFrame(gameLoopId);
            initGame();
            direction = 'RIGHT';
            nextDirection = 'RIGHT';
            gameRunning = true;
            lastMoveTime = 0;
            drawGame();
            startGameLoop();
        }
        
        // ----- ПРИВЯЗКА СОБЫТИЙ -----
        function attachEvents() {
            // Свайпы
            canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
            canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
            canvas.addEventListener('touchend', handleTouchEnd);
            canvas.addEventListener('touchcancel', handleTouchEnd);
            // Клавиатура
            window.addEventListener('keydown', handleKeydown);
            // Кнопки управления
            const ctrlBtns = document.querySelectorAll('.ctrl-btn');
            ctrlBtns.forEach(btn => {
                const dir = btn.getAttribute('data-dir');
                if(!dir) return;
                const handler = (e) => {
                    e.preventDefault();
                    setDirection(dir);
                };
                btn.addEventListener('click', handler);
                btn.addEventListener('touchstart', handler, { passive: false });
            });
            // Кнопка рестарт
            document.getElementById('restartButton').addEventListener('click', () => restartGame());
            // Кнопки изменения сетки
            document.getElementById('gridMinus').addEventListener('click', () => changeGrid(-1));
            document.getElementById('gridPlus').addEventListener('click', () => changeGrid(1));
            
            // Блокировка скролла на canvas
            document.body.addEventListener('touchmove', (e) => {
                if(e.target === canvas || canvas.contains(e.target)) {
                    e.preventDefault();
                }
            }, { passive: false });
        }
        
        // ----- ЗАПУСК ВСЕГО -----
