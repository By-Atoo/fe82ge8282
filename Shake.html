<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Shake</title>
    <style>
        * {
            user-select: none;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'Fira Code', monospace;
            padding: 0;
            overflow-x: hidden;
        }

        /* Динамический радужный фон через JS (будет меняться плавно) */
        .rainbow-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            transition: background 1.2s ease;
        }

        .overlay-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.25) 100%);
            pointer-events: none;
            z-index: -1;
        }

        .game-container {
            width: 100%;
            max-width: 100vw;
            padding: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-console {
            background: rgba(10, 15, 8, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 18px 16px 20px 16px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,200,0.2);
            width: 100%;
            max-width: 1200px;
        }

        .game-layout {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .canvas-area {
            flex: 4;
            min-width: 260px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: #0a1f0a;
            border-radius: 32px;
            box-shadow: 0 0 0 4px #ffefb0, 0 15px 30px black;
            cursor: pointer;
            aspect-ratio: 1 / 1;
            max-width: 85vw;
            max-height: 85vw;
        }

        /* Сенсорные кнопки — скрыты на ПК (ширина > 900px), видны только на планшетах/мобилках */
        .touch-panel {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .arrow-row {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .ctrl-btn {
            background: #1e2a1aee;
            backdrop-filter: blur(4px);
            border: none;
            font-size: 44px;
            font-weight: bold;
            padding: 8px 24px;
            border-radius: 60px;
            box-shadow: 0 6px 0 #0e3b0e;
            transition: 0.05s linear;
            cursor: pointer;
            color: #ffffbb;
            min-width: 85px;
            font-family: monospace;
        }

        .ctrl-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #0e3b0e;
        }

        /* На ПК скрываем кнопки управления (только свайпы и клавиатура) */
        @media (min-width: 901px) {
            .touch-panel {
                display: none;
            }
        }

        /* Боковая панель */
        .sidebar {
            flex: 1;
            min-width: 140px;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 20px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 35px;
            border: 1px solid #ffd966aa;
        }

        .score-console {
            text-align: center;
            background: #00000099;
            width: 100%;
            border-radius: 40px;
            padding: 12px 5px;
            border-bottom: 3px solid #ffcc44;
        }

        .score-label {
            font-size: 20px;
            color: #ffec9e;
            letter-spacing: 2px;
        }

        .score-value {
            font-size: 68px;
            font-weight: bold;
            color: #ffffb0;
            text-shadow: 0 0 8px #ffaa33;
            font-family: monospace;
            line-height: 1;
        }

        .settings-btn {
            background: #ffb347dd;
            border: none;
            font-size: 52px;
            cursor: pointer;
            padding: 12px;
            border-radius: 60px;
            width: 90px;
            transition: 0.08s linear;
            box-shadow: 0 6px 0 #9b551a;
            color: #2c1c0a;
        }

        .settings-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #9b551a;
        }

        /* Модальные окна — крестик внутри контента */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.2s;
        }

        .modal.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-content {
            background: #0f1a0f;
            border-radius: 56px;
            padding: 28px 28px 32px;
            max-width: 360px;
            width: 85%;
            text-align: center;
            border: 2px solid #ffcc55;
            box-shadow: 0 0 35px #ffaa33;
            color: #ffffdd;
            position: relative;
        }

        .modal-content h2 {
            font-size: 34px;
            margin: 0 0 16px 0;
            text-transform: uppercase;
        }

        .modal-stats {
            font-size: 24px;
            margin: 20px 0;
            background: #00000077;
            padding: 12px;
            border-radius: 40px;
        }

        .modal-stats p {
            margin: 10px 0;
        }

        .modal-btn {
            background: #ffb347;
            border: none;
            font-size: 24px;
            font-weight: bold;
            padding: 12px 20px;
            border-radius: 60px;
            font-family: monospace;
            cursor: pointer;
            margin-top: 14px;
            width: 100%;
            box-shadow: 0 5px 0 #9b551a;
        }

        .modal-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #9b551a;
        }

        /* Крестик теперь внутри, справа вверху */
        .modal-close {
            position: absolute;
            top: 18px;
            right: 24px;
            font-size: 32px;
            cursor: pointer;
            color: #ffcc77;
            transition: 0.1s;
            line-height: 1;
        }
        .modal-close:hover {
            color: #ffaa33;
            transform: scale(1.1);
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
            gap: 12px;
            flex-wrap: wrap;
        }

        .setting-row label {
            font-size: 18px;
            font-weight: bold;
        }

        input[type="range"] {
            flex: 2;
            min-width: 140px;
        }

        .value-display {
            background: black;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: bold;
        }

        /* Адаптация под мобильные */
        @media (max-width: 700px) {
            .game-layout {
                flex-direction: column;
                align-items: center;
            }
            .sidebar {
                flex-direction: row;
                justify-content: space-evenly;
                width: 100%;
                padding: 16px 12px;
                gap: 15px;
            }
            .score-value {
                font-size: 48px;
            }
            canvas {
                max-width: 92vw;
                max-height: 92vw;
            }
        }

        @media (max-width: 480px) {
            .settings-btn {
                font-size: 40px;
                width: 70px;
            }
        }
    </style>
</head>
<body>
<div class="rainbow-bg" id="rainbowBg"></div>
<div class="overlay-glow"></div>

<div class="game-container">
    <div class="game-console">
        <div class="game-layout">
            <div class="canvas-area">
                <canvas id="snakeCanvas" width="700" height="700"></canvas>
                <!-- Сенсорные кнопки (на мобилках видны, на ПК скрыты) -->
                <div class="touch-panel">
                    <div class="arrow-row">
                        <button class="ctrl-btn" data-dir="UP">▲</button>
                    </div>
                    <div class="arrow-row">
                        <button class="ctrl-btn" data-dir="LEFT">◀</button>
                        <button class="ctrl-btn" data-dir="DOWN">▼</button>
                        <button class="ctrl-btn" data-dir="RIGHT">▶</button>
                    </div>
                </div>
            </div>

            <div class="sidebar">
                <div class="score-console">
                    <div class="score-label">СЧЕТ</div>
                    <div class="score-value" id="scoreValue">0</div>
                </div>
                <button class="settings-btn" id="openSettingsBtn">⚙️</button>
            </div>
        </div>
    </div>
</div>

<!-- Модальное окно GAME OVER / WIN -->
<div id="gameOverModal" class="modal">
    <div class="modal-content">
        <div class="modal-close" id="closeGameOverModal">✖</div>
        <h2 id="modalTitle">💀GAME OVER💀</h2>
        <div class="modal-stats">
            <p>🐍 Счёт: <span id="finalScore">0</span></p>
            <p>⏱️ Время: <span id="gameTime">0</span> сек.</p>
        </div>
        <button class="modal-btn" id="restartFromDeathBtn">⟳ НОВАЯ ИГРА</button>
    </div>
</div>

<!-- Модальное окно НАСТРОЕК -->
<div id="settingsModal" class="modal">
    <div class="modal-content">
        <div class="modal-close" id="closeSettingsModal">✖</div>
        <h2>⚙️ НАСТРОЙКИ</h2>
        <div class="setting-row">
            <label>📐 РАЗМЕР СЕТКИ</label>
            <button id="gridMinus" style="background:#2e2e1e;border:none;font-size:22px;width:44px;">−</button>
            <span id="gridSizeValue" style="min-width:50px;text-align:center;font-weight:bold;">20</span>
            <button id="gridPlus" style="background:#2e2e1e;border:none;font-size:22px;width:44px;">+</button>
        </div>
        <div class="setting-row">
            <label>⚡ СКОРОСТЬ (мс/на клетку)</label>
            <input type="range" id="speedSlider" min="70" max="220" step="5" value="110">
            <span id="speedValue" class="value-display">110</span>
        </div>
        <button class="modal-btn" id="applySettingsBtn">ПРИМЕНИТЬ И РЕСТАРТ</button>
        <button class="modal-btn" id="resetSettingsBtn" style="background:#5f4a2e;">⟳ СБРОСИТЬ НАСТРОЙКИ</button>
    </div>
</div>

<script>
    (function(){
        // ----- ЭЛЕМЕНТЫ -----
        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreValue');
        const gameOverModal = document.getElementById('gameOverModal');
        const settingsModal = document.getElementById('settingsModal');
        const finalScoreSpan = document.getElementById('finalScore');
        const gameTimeSpan = document.getElementById('gameTime');
        const modalTitle = document.getElementById('modalTitle');
        const gridSizeValueSpan = document.getElementById('gridSizeValue');
        const speedSlider = document.getElementById('speedSlider');
        const speedValueSpan = document.getElementById('speedValue');
        const rainbowBg = document.getElementById('rainbowBg');
        
        // ----- РАДУЖНЫЙ ФОН (перелив ВСЕМИ цветами) -----
        let hue = 0;
        function updateRainbowBackground() {
            // Плавный переход через hsl (полный круг 0-360)
            const color1 = `hsl(${hue}, 100%, 55%)`;
            const color2 = `hsl(${(hue + 60) % 360}, 100%, 55%)`;
            const color3 = `hsl(${(hue + 120) % 360}, 100%, 55%)`;
            const color4 = `hsl(${(hue + 180) % 360}, 100%, 55%)`;
            rainbowBg.style.background = `linear-gradient(125deg, ${color1}, ${color2}, ${color3}, ${color4})`;
            rainbowBg.style.backgroundSize = '400% 400%';
            hue = (hue + 1.5) % 360; // плавное изменение
            requestAnimationFrame(() => { setTimeout(updateRainbowBackground, 60); });
        }
        updateRainbowBackground();
        
        // ----- ИГРОВЫЕ ПАРАМЕТРЫ -----
        const DEFAULT_GRID = 20;
        const DEFAULT_SPEED = 110;
        
        let GRID_SIZE = DEFAULT_GRID;
        let CELL_SIZE = canvas.width / GRID_SIZE;
        let gameSpeed = DEFAULT_SPEED;
        
        let snake = [];
        let food = { x: 12, y: 12 };
        let direction = 'RIGHT';
        let nextDirection = 'RIGHT';
        let score = 0;
        let gameRunning = true;
        let gameLoopId = null;
        let lastMoveTime = 0;
        let sessionStartTime = null;
        
        // Яблоко
        let appleImage = new Image();
        let appleLoaded = false;
        const APPLE_URL = 'https://raw.githubusercontent.com/By-Atoo/fe82ge8282/main/.res/apple.png';
        appleImage.onload = () => { appleLoaded = true; drawGame(); };
        appleImage.onerror = () => { appleLoaded = false; drawGame(); };
        appleImage.src = APPLE_URL;
        
        // ----- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ -----
        function updateCellSize() {
            CELL_SIZE = canvas.width / GRID_SIZE;
        }
        
        function isPartOfSnake(x, y) {
            return snake.some(seg => seg.x === x && seg.y === y);
        }
        
        function generateValidFood() {
            const maxAttempts = 5000;
            for(let i = 0; i < maxAttempts; i++) {
                const randX = Math.floor(Math.random() * GRID_SIZE);
                const randY = Math.floor(Math.random() * GRID_SIZE);
                if(!isPartOfSnake(randX, randY)) {
                    food = { x: randX, y: randY };
                    return;
                }
            }
            for(let y = 0; y < GRID_SIZE; y++) {
                for(let x = 0; x < GRID_SIZE; x++) {
                    if(!isPartOfSnake(x, y)) {
                        food = { x, y };
                        return;
                    }
                }
            }
            gameWin();
        }
        
        function updateScoreUI() {
            scoreSpan.innerText = score;
        }
        
        function startSessionTimer() {
            sessionStartTime = Date.now();
        }
        
        function getSessionDuration() {
            if(!sessionStartTime) return 0;
            return Math.floor((Date.now() - sessionStartTime) / 1000);
        }
        
        function initGame(resetTimer = true) {
            const center = Math.floor(GRID_SIZE / 2);
            snake = [
                { x: center, y: center },
                { x: center-1, y: center },
                { x: center-2, y: center }
            ];
            direction = 'RIGHT';
            nextDirection = 'RIGHT';
            score = 0;
            gameRunning = true;
            updateScoreUI();
            generateValidFood();
            drawGame();
            if(resetTimer) startSessionTimer();
        }
        
        function moveSnake() {
            if(!gameRunning) return false;
            
            let newDir = nextDirection;
            if((newDir === 'RIGHT' && direction === 'LEFT') ||
               (newDir === 'LEFT' && direction === 'RIGHT') ||
               (newDir === 'UP' && direction === 'DOWN') ||
               (newDir === 'DOWN' && direction === 'UP')) {
                newDir = direction;
            }
            direction = newDir;
            
            let newHead = { ...snake[0] };
            switch(direction) {
                case 'RIGHT': newHead.x += 1; break;
                case 'LEFT':  newHead.x -= 1; break;
                case 'UP':    newHead.y -= 1; break;
                case 'DOWN':  newHead.y += 1; break;
            }
            
            const willEat = (newHead.x === food.x && newHead.y === food.y);
            snake.unshift(newHead);
            if(!willEat) {
                snake.pop();
            } else {
                score++;
                updateScoreUI();
                generateValidFood();
            }
            
            const head = snake[0];
            if(head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                gameOver();
                return false;
            }
            for(let i = 1; i < snake.length; i++) {
                if(snake[i].x === head.x && snake[i].y === head.y) {
                    gameOver();
                    return false;
                }
            }
            return true;
        }
        
        function gameOver() {
            if(!gameRunning) return;
            gameRunning = false;
            if(gameLoopId) {
                cancelAnimationFrame(gameLoopId);
                gameLoopId = null;
            }
            const duration = getSessionDuration();
            finalScoreSpan.innerText = score;
            gameTimeSpan.innerText = duration;
            modalTitle.innerHTML = '💀GAME OVER💀';
            gameOverModal.classList.add('active');
            drawGame();
        }
        
        function gameWin() {
            if(!gameRunning) return;
            gameRunning = false;
            if(gameLoopId) {
                cancelAnimationFrame(gameLoopId);
                gameLoopId = null;
            }
            const duration = getSessionDuration();
            finalScoreSpan.innerText = score;
            gameTimeSpan.innerText = duration;
            modalTitle.innerHTML = '🏆VICTORY🏆';
            gameOverModal.classList.add('active');
            drawGame();
        }
        
        // Отрисовка
        function drawGame() {
            if(!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0a1a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#4aff4a';
            ctx.lineWidth = 1.2;
            for(let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }
            
            const fx = food.x * CELL_SIZE;
            const fy = food.y * CELL_SIZE;
            const size = CELL_SIZE;
            if(appleLoaded && appleImage.complete && appleImage.naturalWidth > 0) {
                const pad = Math.max(2, CELL_SIZE * 0.1);
                ctx.drawImage(appleImage, fx + pad, fy + pad, size - pad*2, size - pad*2);
            } else {
                ctx.fillStyle = '#ff5e5e';
                ctx.beginPath();
                ctx.arc(fx + size/2, fy + size/2, size/2 - 3, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#ffff99';
                ctx.beginPath();
                ctx.arc(fx + size/2 - 3, fy + size/2 - 4, 3, 0, Math.PI*2);
                ctx.fill();
            }
            
            for(let i = 0; i < snake.length; i++) {
                const seg = snake[i];
                const x = seg.x * CELL_SIZE;
                const y = seg.y * CELL_SIZE;
                const radius = Math.max(3, CELL_SIZE * 0.2);
                ctx.fillStyle = i === 0 ? '#aaff77' : '#55dd44';
                ctx.shadowBlur = 5;
                ctx.shadowColor = '#88ff88';
                ctx.beginPath();
                ctx.roundRect(x + 2, y + 2, CELL_SIZE - 4, CELL_SIZE - 4, radius);
                ctx.fill();
                ctx.strokeStyle = '#006400';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.roundRect(x + 2, y + 2, CELL_SIZE - 4, CELL_SIZE - 4, radius);
                ctx.stroke();
                if(i === 0) {
                    ctx.fillStyle = '#ffffff';
                    const eyeOff = CELL_SIZE * 0.25;
                    ctx.beginPath();
                    ctx.arc(x + CELL_SIZE - eyeOff, y + eyeOff, 3, 0, Math.PI*2);
                    ctx.arc(x + eyeOff, y + eyeOff, 3, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.arc(x + CELL_SIZE - eyeOff - 1, y + eyeOff - 1, 1.8, 0, Math.PI*2);
                    ctx.arc(x + eyeOff - 1, y + eyeOff - 1, 1.8, 0, Math.PI*2);
                    ctx.fill();
                }
            }
            ctx.shadowBlur = 0;
        }
        
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x+r, y);
                this.lineTo(x+w-r, y);
                this.quadraticCurveTo(x+w, y, x+w, y+r);
                this.lineTo(x+w, y+h-r);
                this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
                this.lineTo(x+r, y+h);
                this.quadraticCurveTo(x, y+h, x, y+h-r);
                this.lineTo(x, y+r);
                this.quadraticCurveTo(x, y, x+r, y);
                return this;
            };
        }
        
        // Игровой цикл
        function gameTick(now) {
            if(!gameRunning) {
                drawGame();
                return;
            }
            if(!lastMoveTime) {
                lastMoveTime = now;
                requestAnimationFrame(gameTick);
                drawGame();
                return;
            }
            const elapsed = now - lastMoveTime;
            if(elapsed >= gameSpeed) {
                const success = moveSnake();
                lastMoveTime = now;
                drawGame();
                if(!success) {
                    if(gameLoopId) cancelAnimationFrame(gameLoopId);
                    gameLoopId = null;
                    drawGame();
                    return;
                }
            }
            drawGame();
            gameLoopId = requestAnimationFrame(gameTick);
        }
        
        function startGameLoop() {
            if(gameLoopId) cancelAnimationFrame(gameLoopId);
            lastMoveTime = 0;
            gameRunning = true;
            gameLoopId = requestAnimationFrame(gameTick);
        }
        
        // Управление (свайпы + клавиатура)
        function setDirection(newDir) {
            if(!gameRunning) return;
            if((newDir === 'RIGHT' && direction !== 'LEFT') ||
               (newDir === 'LEFT' && direction !== 'RIGHT') ||
               (newDir === 'UP' && direction !== 'DOWN') ||
               (newDir === 'DOWN' && direction !== 'UP')) {
                nextDirection = newDir;
            }
        }
        
        let touchStart = null;
        function handleTouchStart(e) {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            touchStart = { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
        }
        function handleTouchMove(e) {
            e.preventDefault();
            if(!touchStart || !gameRunning) return;
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const dx = (touch.clientX - rect.left) - touchStart.x;
            const dy = (touch.clientY - rect.top) - touchStart.y;
            if(Math.abs(dx) < 12 && Math.abs(dy) < 12) return;
            let newDir = null;
            if(Math.abs(dx) > Math.abs(dy)) newDir = dx > 0 ? 'RIGHT' : 'LEFT';
            else newDir = dy > 0 ? 'DOWN' : 'UP';
            if(newDir) setDirection(newDir);
            touchStart = null;
        }
        function handleTouchEnd(e) { e.preventDefault(); touchStart = null; }
        function handleKeydown(e) {
            if(!gameRunning) return;
            const key = e.key;
            if(key === 'ArrowUp') setDirection('UP');
            else if(key === 'ArrowDown') setDirection('DOWN');
            else if(key === 'ArrowLeft') setDirection('LEFT');
            else if(key === 'ArrowRight') setDirection('RIGHT');
            else return;
            e.preventDefault();
        }
        
        function fullRestart() {
            if(gameLoopId) cancelAnimationFrame(gameLoopId);
            initGame(true);
            gameRunning = true;
            lastMoveTime = 0;
            startGameLoop();
            gameOverModal.classList.remove('active');
            settingsModal.classList.remove('active');
        }
        
        function resetToDefaultSettings() {
            GRID_SIZE = DEFAULT_GRID;
            gameSpeed = DEFAULT_SPEED;
            updateCellSize();
            speedSlider.value = gameSpeed;
            speedValueSpan.innerText = gameSpeed;
            gridSizeValueSpan.innerText = GRID_SIZE;
            if(gameLoopId) cancelAnimationFrame(gameLoopId);
            initGame(true);
            gameRunning = true;
            lastMoveTime = 0;
            startGameLoop();
            settingsModal.classList.remove('active');
        }
        
        function applySettingsAndRestart() {
            let newGrid = parseInt(gridSizeValueSpan.innerText, 10);
            let newSpeed = parseInt(speedSlider.value, 10);
            if(isNaN(newGrid)) newGrid = GRID_SIZE;
            newGrid = Math.min(35, Math.max(10, newGrid));
            GRID_SIZE = newGrid;
            gameSpeed = newSpeed;
            speedValueSpan.innerText = gameSpeed;
            updateCellSize();
            if(gameLoopId) cancelAnimationFrame(gameLoopId);
            initGame(true);
            gameRunning = true;
            lastMoveTime = 0;
            startGameLoop();
            settingsModal.classList.remove('active');
        }
        
        function attachEvents() {
            canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
            canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
            canvas.addEventListener('touchend', handleTouchEnd);
            window.addEventListener('keydown', handleKeydown);
            
            // Сенсорные кнопки (если видны на мобилках)
            document.querySelectorAll('.ctrl-btn').forEach(btn => {
                const dir = btn.getAttribute('data-dir');
                if(!dir) return;
                btn.addEventListener('click', (e) => { e.preventDefault(); setDirection(dir); });
                btn.addEventListener('touchstart', (e) => { e.preventDefault(); setDirection(dir); });
            });
            
            document.getElementById('closeGameOverModal').onclick = () => gameOverModal.classList.remove('active');
            document.getElementById('closeSettingsModal').onclick = () => settingsModal.classList.remove('active');
            document.getElementById('restartFromDeathBtn').onclick = () => fullRestart();
            document.getElementById('openSettingsBtn').onclick = () => {
                if(gameLoopId) cancelAnimationFrame(gameLoopId);
                gameRunning = false;
                gridSizeValueSpan.innerText = GRID_SIZE;
                speedSlider.value = gameSpeed;
                speedValueSpan.innerText = gameSpeed;
                settingsModal.classList.add('active');
            };
            document.getElementById('applySettingsBtn').onclick = () => applySettingsAndRestart();
            document.getElementById('resetSettingsBtn').onclick = () => resetToDefaultSettings();
            document.getElementById('gridMinus').onclick = () => {
                let val = parseInt(gridSizeValueSpan.innerText,10);
                if(val > 10) gridSizeValueSpan.innerText = val-1;
            };
            document.getElementById('gridPlus').onclick = () => {
                let val = parseInt(gridSizeValueSpan.innerText,10);
                if(val < 35) gridSizeValueSpan.innerText = val+1;
            };
            speedSlider.oninput = () => { speedValueSpan.innerText = speedSlider.value; };
        }
        
        function start() {
            updateCellSize();
            initGame(true);
            startGameLoop();
            attachEvents();
        }
        
        start();
    })();
</script>
</body>
</html>
