<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Змейка | Свайпы + переливающийся фон</title>
    <style>
        * {
            user-select: none;
            touch-action: none; /* отключаем все жесты браузера для свайпов */
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb4d);
            background-size: 400% 400%;
            animation: auroraFlow 12s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', system-ui, monospace;
            padding: 20px;
        }

        /* Плавное переливание фона */
        @keyframes auroraFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .game-container {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 64px;
            padding: 20px;
            backdrop-filter: blur(3px);
            box-shadow: 0 25px 40px rgba(0,0,0,0.4);
        }

        .game-panel {
            background: rgba(30, 20, 15, 0.65);
            border-radius: 48px;
            padding: 20px;
            backdrop-filter: blur(2px);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 32px;
            box-shadow: 0 0 0 6px #ffecb3, 0 15px 30px black;
            background-color: #1e3a1a;
            cursor: pointer;
            width: 100%;
            height: auto;
        }

        /* Увеличенное окно: холст 600x600, но на мобильных масштабируется */
        .canvas-wrapper {
            display: flex;
            justify-content: center;
        }

        .info {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-top: 20px;
            margin-bottom: 8px;
            gap: 16px;
            flex-wrap: wrap;
            padding: 0 8px;
        }

        .score-box {
            background: #000000aa;
            backdrop-filter: blur(8px);
            padding: 6px 24px;
            border-radius: 60px;
            color: #fff0b5;
            font-weight: bold;
            font-size: 32px;
            letter-spacing: 2px;
            text-shadow: 0 2px 5px #00000055;
            font-family: monospace;
            display: flex;
            align-items: baseline;
            gap: 10px;
            border: 1px solid #ffdd88;
        }

        .score-label {
            font-size: 20px;
            color: #ffe6aa;
        }

        .restart-btn {
            background: #ffb347;
            border: none;
            font-size: 22px;
            font-weight: bold;
            padding: 8px 32px;
            border-radius: 80px;
            font-family: inherit;
            color: #2c1c0a;
            cursor: pointer;
            transition: 0.08s linear;
            box-shadow: 0 6px 0 #9b551a;
            letter-spacing: 1px;
        }

        .restart-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #9b551a;
        }

        .status {
            text-align: center;
            margin-top: 12px;
            font-size: 20px;
            font-weight: bold;
            background: #000000aa;
            backdrop-filter: blur(8px);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            padding: 6px 28px;
            border-radius: 60px;
            color: #ffeaac;
            letter-spacing: 1px;
            border: 1px solid #ffcd7e;
        }

        /* Убираем все лишние подписи, подсказки, футер */
        .hidden-subtitles {
            display: none;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-panel">
        <div class="canvas-wrapper">
            <canvas id="snakeCanvas" width="600" height="600"></canvas>
        </div>
        <div class="info">
            <div class="score-box">
                <span class="score-label">🍎</span>
                <span id="scoreValue">0</span>
            </div>
            <button class="restart-btn" id="restartButton">⟳</button>
        </div>
        <div id="gameStatus" class="status">▶</div>
    </div>
</div>

<script>
    (function(){
        // ---------- НАСТРОЙКИ ----------
        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreValue');
        const statusDiv = document.getElementById('gameStatus');
        
        const GRID_SIZE = 20;          // 20x20 клеток
        const CELL_SIZE = canvas.width / GRID_SIZE; // 30px
        
        // Игровые переменные
        let snake = [];
        let food = { x: 12, y: 12 };
        let direction = 'RIGHT';
        let nextDirection = 'RIGHT';
        let score = 0;
        let gameRunning = true;
        let gameLoopId = null;
        let gameSpeed = 110;            // мс на шаг
        let lastMoveTime = 0;
        
        // Текстура яблока
        let appleImage = new Image();
        let appleLoaded = false;
        const APPLE_URL = 'https://raw.githubusercontent.com/By-Atoo/fe82ge8282/main/.res/apple.png';
        
        appleImage.onload = () => {
            appleLoaded = true;
            drawGame();
        };
        appleImage.onerror = () => {
            appleLoaded = false;
            drawGame();
        };
        appleImage.src = APPLE_URL;
        
        // ---------- ИНИЦИАЛИЗАЦИЯ ----------
        function initGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = 'RIGHT';
            nextDirection = 'RIGHT';
            score = 0;
            gameRunning = true;
            updateScoreUI();
            statusDiv.innerHTML = '▶';
            statusDiv.style.color = '#d4ffb0';
            generateValidFood();
            drawGame();
        }
        
        function isPartOfSnake(x, y) {
            return snake.some(seg => seg.x === x && seg.y === y);
        }
        
        function generateValidFood() {
            const maxAttempts = 5000;
            for(let i = 0; i < maxAttempts; i++) {
                const randX = Math.floor(Math.random() * GRID_SIZE);
                const randY = Math.floor(Math.random() * GRID_SIZE);
                if(!isPartOfSnake(randX, randY)) {
                    food = { x: randX, y: randY };
                    return;
                }
            }
            // Если почти всё занято — ищем вручную
            for(let y = 0; y < GRID_SIZE; y++) {
                for(let x = 0; x < GRID_SIZE; x++) {
                    if(!isPartOfSnake(x, y)) {
                        food = { x, y };
                        return;
                    }
                }
            }
            gameWin(); // нет свободных клеток
        }
        
        function updateScoreUI() {
            scoreSpan.innerText = score;
        }
        
        // Логика движения
        function moveSnake() {
            if(!gameRunning) return false;
            
            let newDir = nextDirection;
            if((newDir === 'RIGHT' && direction === 'LEFT') ||
               (newDir === 'LEFT' && direction === 'RIGHT') ||
               (newDir === 'UP' && direction === 'DOWN') ||
               (newDir === 'DOWN' && direction === 'UP')) {
                newDir = direction;
            }
            direction = newDir;
            
            let newHead = { ...snake[0] };
            switch(direction) {
                case 'RIGHT': newHead.x += 1; break;
                case 'LEFT':  newHead.x -= 1; break;
                case 'UP':    newHead.y -= 1; break;
                case 'DOWN':  newHead.y += 1; break;
            }
            
            const willEat = (newHead.x === food.x && newHead.y === food.y);
            snake.unshift(newHead);
            if(!willEat) {
                snake.pop();
            } else {
                score++;
                updateScoreUI();
                generateValidFood();
            }
            
            const head = snake[0];
            // Стены
            if(head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                gameOver('💀');
                return false;
            }
            // Самостолкновение
            for(let i = 1; i < snake.length; i++) {
                if(snake[i].x === head.x && snake[i].y === head.y) {
                    gameOver('💀');
                    return false;
                }
            }
            return true;
        }
        
        function gameOver(reason) {
            if(!gameRunning) return;
            gameRunning = false;
            statusDiv.innerHTML = '💀';
            statusDiv.style.color = '#ffa07a';
            if(gameLoopId) {
                cancelAnimationFrame(gameLoopId);
                gameLoopId = null;
            }
            drawGame();
        }
        
        function gameWin() {
            if(!gameRunning) return;
            gameRunning = false;
            statusDiv.innerHTML = '🏆';
            statusDiv.style.color = '#ffd966';
            if(gameLoopId) {
                cancelAnimationFrame(gameLoopId);
                gameLoopId = null;
            }
            drawGame();
        }
        
        // ---------- ОТРИСОВКА ----------
        function drawGame() {
            if(!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Яркий фон поля (сочная трава)
            ctx.fillStyle = '#a8e66b';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Рисуем сетку
            ctx.strokeStyle = '#caff8a';
            ctx.lineWidth = 1.2;
            for(let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }
            
            // Рисуем еду (яблоко)
            const fx = food.x * CELL_SIZE;
            const fy = food.y * CELL_SIZE;
            const size = CELL_SIZE;
            if(appleLoaded && appleImage.complete && appleImage.naturalWidth > 0) {
                const padding = 3;
                ctx.drawImage(appleImage, fx + padding, fy + padding, size - padding*2, size - padding*2);
            } else {
                // fallback яркое яблоко
                ctx.fillStyle = '#ff3b3b';
                ctx.shadowBlur = 2;
                ctx.beginPath();
                ctx.arc(fx + size/2, fy + size/2, size/2 - 3, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#f9e05e';
                ctx.beginPath();
                ctx.arc(fx + size/2 - 3, fy + size/2 - 4, 2.5, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#5e8c3a';
                ctx.beginPath();
                ctx.moveTo(fx + size/2 + 3, fy + size/2 - 9);
                ctx.lineTo(fx + size/2 + 8, fy + size/2 - 15);
                ctx.lineTo(fx + size/2 - 1, fy + size/2 - 11);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
            
            // Рисуем змейку
            for(let i = 0; i < snake.length; i++) {
                const seg = snake[i];
                const x = seg.x * CELL_SIZE;
                const y = seg.y * CELL_SIZE;
                const radius = 6;
                const grad = ctx.createLinearGradient(x, y, x+CELL_SIZE, y+CELL_SIZE);
                if(i === 0) {
                    grad.addColorStop(0, '#7ef86a');
                    grad.addColorStop(1, '#48c43b');
                } else {
                    grad.addColorStop(0, '#5fdf52');
                    grad.addColorStop(1, '#38a52c');
                }
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.roundRect(x + 2, y + 2, CELL_SIZE - 4, CELL_SIZE - 4, radius);
                ctx.fill();
                ctx.strokeStyle = '#1f771a';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.roundRect(x + 2, y + 2, CELL_SIZE - 4, CELL_SIZE - 4, radius);
                ctx.stroke();
                
                // Глаза для головы
                if(i === 0) {
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(x + CELL_SIZE - 9, y + 9, 3.5, 0, Math.PI*2);
                    ctx.arc(x + 9, y + 9, 3.5, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = '#010101';
                    ctx.beginPath();
                    ctx.arc(x + CELL_SIZE - 9.5, y + 8, 2, 0, Math.PI*2);
                    ctx.arc(x + 8.5, y + 8, 2, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = 'white';
                    ctx.beginPath();
                    ctx.arc(x + CELL_SIZE - 10.5, y + 7, 1, 0, Math.PI*2);
                    ctx.arc(x + 7.5, y + 7, 1, 0, Math.PI*2);
                    ctx.fill();
                }
            }
        }
        
        // Вспомогательный roundRect
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x+r, y);
                this.lineTo(x+w-r, y);
                this.quadraticCurveTo(x+w, y, x+w, y+r);
                this.lineTo(x+w, y+h-r);
                this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
                this.lineTo(x+r, y+h);
                this.quadraticCurveTo(x, y+h, x, y+h-r);
                this.lineTo(x, y+r);
                this.quadraticCurveTo(x, y, x+r, y);
                return this;
            };
        }
        
        // ---------- ИГРОВОЙ ЦИКЛ ----------
        function gameTick(now) {
            if(!gameRunning) {
                drawGame();
                if(gameLoopId) {
                    cancelAnimationFrame(gameLoopId);
                    gameLoopId = null;
                }
                return;
            }
            
            if(!lastMoveTime) {
                lastMoveTime = now;
                requestAnimationFrame(gameTick);
                drawGame();
                return;
            }
            
            const elapsed = now - lastMoveTime;
            if(elapsed >= gameSpeed) {
                const success = moveSnake();
                lastMoveTime = now;
                drawGame();
                if(!success) {
                    if(gameLoopId) {
                        cancelAnimationFrame(gameLoopId);
                        gameLoopId = null;
                    }
                    drawGame();
                    return;
                }
            }
            drawGame();
            gameLoopId = requestAnimationFrame(gameTick);
        }
        
        function startGameLoop() {
            if(gameLoopId) cancelAnimationFrame(gameLoopId);
            lastMoveTime = 0;
            gameRunning = true;
            gameLoopId = requestAnimationFrame(gameTick);
        }
        
        // ---------- УПРАВЛЕНИЕ СВАЙПАМИ (полностью заменяет стрелки) ----------
        let touchStart = null;
        
        function handleTouchStart(e) {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            touchStart = {
                x: touch.clientX - rect.left,
                y: touch.clientY - rect.top,
                time: Date.now()
            };
        }
        
        function handleTouchMove(e) {
            e.preventDefault();
            if(!touchStart || !gameRunning) return;
            
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const currentX = touch.clientX - rect.left;
            const currentY = touch.clientY - rect.top;
            
            const dx = currentX - touchStart.x;
            const dy = currentY - touchStart.y;
            
            // минимальная длина свайпа (10px чтобы избежать ложных)
            if(Math.abs(dx) < 12 && Math.abs(dy) < 12) return;
            
            let newDir = null;
            if(Math.abs(dx) > Math.abs(dy)) {
                // горизонтальный свайп
                newDir = dx > 0 ? 'RIGHT' : 'LEFT';
            } else {
                newDir = dy > 0 ? 'DOWN' : 'UP';
            }
            
            if(newDir) {
                // запрет разворота
                if((newDir === 'RIGHT' && direction !== 'LEFT') ||
                   (newDir === 'LEFT' && direction !== 'RIGHT') ||
                   (newDir === 'UP' && direction !== 'DOWN') ||
                   (newDir === 'DOWN' && direction !== 'UP')) {
                    nextDirection = newDir;
                }
            }
            touchStart = null; // сбрасываем после обработки
        }
        
        function handleTouchEnd(e) {
            e.preventDefault();
            touchStart = null;
        }
        
        // Клавиатура (оставлена для удобства, но не рекламируется)
        function handleKeydown(e) {
            if(!gameRunning) return;
            let mapped = null;
            if(e.key === 'ArrowUp') mapped = 'UP';
            else if(e.key === 'ArrowDown') mapped = 'DOWN';
            else if(e.key === 'ArrowLeft') mapped = 'LEFT';
            else if(e.key === 'ArrowRight') mapped = 'RIGHT';
            if(mapped) {
                e.preventDefault();
                if((mapped === 'RIGHT' && direction !== 'LEFT') ||
                   (mapped === 'LEFT' && direction !== 'RIGHT') ||
                   (mapped === 'UP' && direction !== 'DOWN') ||
                   (mapped === 'DOWN' && direction !== 'UP')) {
                    nextDirection = mapped;
                }
            }
        }
        
        function restartGame() {
            if(gameLoopId) {
                cancelAnimationFrame(gameLoopId);
                gameLoopId = null;
            }
            initGame();
            direction = 'RIGHT';
            nextDirection = 'RIGHT';
            gameRunning = true;
            lastMoveTime = 0;
            drawGame();
            startGameLoop();
        }
        
        // ---------- ЗАПУСК ----------
        window.addEventListener('load', () => {
            initGame();
            startGameLoop();
            
            // Свайпы
            canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
            canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
            canvas.addEventListener('touchend', handleTouchEnd);
            canvas.addEventListener('touchcancel', handleTouchEnd);
            
            // Клавиатура (дополнительно, но без подсказок)
            window.addEventListener('keydown', handleKeydown);
            
            const restartBtn = document.getElementById('restartButton');
            if(restartBtn) restartBtn.addEventListener('click', () => restartGame());
            
            // Защита от скролла на всем окне
            document.body.addEventListener('touchmove', (e) => {
                if(e.target === canvas || canvas.contains(e.target)) {
                    e.preventDefault();
                }
            }, { passive: false });
        });
    })();
</script>
</body>
    </html>
