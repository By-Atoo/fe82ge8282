<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Змейка :: консольная версия</title>
    <style>
        * {
            user-select: none;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f0a, #030603);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'Fira Code', monospace;
            padding: 20px;
        }

        /* главный блок в стиле консольной консоли */
        .console-wrapper {
            background: #0c0f0c;
            border-radius: 28px;
            padding: 20px;
            box-shadow: 0 0 0 2px #2e6b2e, 0 15px 30px rgba(0,0,0,0.6), inset 0 0 15px rgba(0,255,0,0.1);
            backdrop-filter: blur(0px);
        }

        .game-console {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
            gap: 24px;
            background: #010101cc;
            border-radius: 20px;
            padding: 18px;
        }

        /* игровое поле — кибер-монитор */
        .canvas-area {
            flex: 3;
            min-width: 280px;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 18px;
            box-shadow: 0 0 0 3px #2ecc2e, 0 0 0 6px #0f3f0f, 0 10px 25px black;
            background-color: #001000;
            cursor: pointer;
            width: 100%;
            height: auto;
        }

        /* боковая панель: счёт и настройки (в сторону) */
        .sidebar {
            flex: 0.8;
            min-width: 130px;
            background: #0a120a;
            border-radius: 28px;
            padding: 20px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 35px;
            box-shadow: inset 0 0 8px #2e6b2e, 0 5px 12px black;
            border: 1px solid #2b792b;
        }

        .score-console {
            text-align: center;
            background: #000000aa;
            width: 100%;
            border-radius: 40px;
            padding: 12px 5px;
            border-bottom: 3px solid #3eaa3e;
        }

        .score-label {
            font-size: 18px;
            color: #6f9e6f;
            letter-spacing: 2px;
        }

        .score-value {
            font-size: 58px;
            font-weight: bold;
            color: #b3ffa7;
            text-shadow: 0 0 6px #00ff33;
            font-family: monospace;
            line-height: 1;
        }

        .settings-btn {
            background: #1e2a1a;
            border: none;
            font-size: 48px;
            cursor: pointer;
            padding: 12px;
            border-radius: 60px;
            width: 80px;
            transition: 0.08s linear;
            box-shadow: 0 6px 0 #0e3b0e;
            color: #e5ffb3;
        }

        .settings-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #0e3b0e;
        }

        /* сенсорное управление (кнопки без лишних надписей) */
        .touch-panel {
            margin-top: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .arrow-row {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .ctrl-btn {
            background: #1e2a1a;
            border: none;
            font-size: 40px;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 50px;
            box-shadow: 0 5px 0 #0e3b0e;
            transition: 0.05s linear;
            cursor: pointer;
            color: #ccff99;
            min-width: 80px;
        }

        .ctrl-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #0e3b0e;
        }

        /* модальные окна (смерть / настройки) */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(6px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            font-family: 'Courier New', monospace;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.2s;
        }

        .modal.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-content {
            background: #0b130b;
            border-radius: 48px;
            padding: 28px 32px;
            max-width: 340px;
            width: 80%;
            text-align: center;
            border: 2px solid #3cb043;
            box-shadow: 0 0 25px #00aa33;
            color: #c3ffb2;
        }

        .modal-content h2 {
            font-size: 32px;
            margin: 0 0 16px 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .modal-stats {
            font-size: 22px;
            margin: 20px 0;
            background: #00000066;
            padding: 12px;
            border-radius: 32px;
        }

        .modal-stats p {
            margin: 8px 0;
        }

        .modal-btn {
            background: #ffb347;
            border: none;
            font-size: 24px;
            font-weight: bold;
            padding: 10px 24px;
            border-radius: 60px;
            font-family: monospace;
            cursor: pointer;
            margin-top: 12px;
            width: 100%;
            box-shadow: 0 4px 0 #9b551a;
        }

        .modal-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #9b551a;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 18px 0;
            gap: 15px;
            flex-wrap: wrap;
        }

        .setting-row label {
            font-size: 18px;
            font-weight: bold;
        }

        input[type="range"] {
            flex: 2;
            min-width: 140px;
        }

        .value-display {
            background: black;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
        }

        .close-icon {
            position: absolute;
            top: 18px;
            right: 24px;
            font-size: 32px;
            cursor: pointer;
            color: #ffaa55;
        }

        @media (max-width: 650px) {
            .game-console {
                flex-direction: column;
            }
            .sidebar {
                flex-direction: row;
                justify-content: space-around;
                width: 100%;
            }
            .ctrl-btn {
                font-size: 28px;
                padding: 6px 14px;
                min-width: 60px;
            }
            .score-value {
                font-size: 42px;
            }
        }
    </style>
</head>
<body>
<div class="console-wrapper">
    <div class="game-console">
        <!-- игровая область -->
        <div class="canvas-area">
            <canvas id="snakeCanvas" width="700" height="700"></canvas>
            <!-- сенсорные кнопки (только стрелки, без подписей) -->
            <div class="touch-panel">
                <div class="arrow-row">
                    <button class="ctrl-btn" data-dir="UP">▲</button>
                </div>
                <div class="arrow-row">
                    <button class="ctrl-btn" data-dir="LEFT">◀</button>
                    <button class="ctrl-btn" data-dir="DOWN">▼</button>
                    <button class="ctrl-btn" data-dir="RIGHT">▶</button>
                </div>
            </div>
        </div>

        <!-- боковая панель: только счёт и шестерёнка -->
        <div class="sidebar">
            <div class="score-console">
                <div class="score-label">🍎 СЧЕТ</div>
                <div class="score-value" id="scoreValue">0</div>
            </div>
            <button class="settings-btn" id="openSettingsBtn">⚙️</button>
        </div>
    </div>
</div>

<!-- Модальное окно GAME OVER / WIN -->
<div id="gameOverModal" class="modal">
    <div class="modal-content">
        <div class="close-icon" id="closeGameOverModal">✖</div>
        <h2 id="modalTitle">💀 GAME OVER 💀</h2>
        <div class="modal-stats">
            <p>🐍 Счёт: <span id="finalScore">0</span></p>
            <p>⏱️ Время игры: <span id="gameTime">0</span> сек.</p>
        </div>
        <button class="modal-btn" id="restartFromDeathBtn">⟳ НОВАЯ ИГРА</button>
    </div>
</div>

<!-- Модальное окно НАСТРОЕК -->
<div id="settingsModal" class="modal">
    <div class="modal-content">
        <div class="close-icon" id="closeSettingsModal">✖</div>
        <h2>⚙️ КОНСОЛЬ</h2>
        <div class="setting-row">
            <label>📐 РАЗМЕР СЕТКИ</label>
            <button id="gridMinus" style="background:#2e2e1e;border:none;font-size:22px;width:40px;">−</button>
            <span id="gridSizeValue" style="min-width:45px;text-align:center;font-weight:bold;">20</span>
            <button id="gridPlus" style="background:#2e2e1e;border:none;font-size:22px;width:40px;">+</button>
        </div>
        <div class="setting-row">
            <label>⚡ СКОРОСТЬ (мс)</label>
            <input type="range" id="speedSlider" min="70" max="220" step="5" value="110">
            <span id="speedValue" class="value-display">110</span>
        </div>
        <button class="modal-btn" id="applySettingsBtn">ПРИМЕНИТЬ И РЕСТАРТ</button>
        <button class="modal-btn" id="resetFromSettingsBtn" style="background:#5f4a2e;">⟳ СБРОС ИГРЫ</button>
    </div>
</div>

<script>
    (function(){
        // ------ DOM элементы ------
        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreValue');
        const gameOverModal = document.getElementById('gameOverModal');
        const settingsModal = document.getElementById('settingsModal');
        const finalScoreSpan = document.getElementById('finalScore');
        const gameTimeSpan = document.getElementById('gameTime');
        const modalTitle = document.getElementById('modalTitle');
        const gridSizeValueSpan = document.getElementById('gridSizeValue');
        const speedSlider = document.getElementById('speedSlider');
        const speedValueSpan = document.getElementById('speedValue');
        
        // ------ Игровые параметры ------
        let GRID_SIZE = 20;          // изменяемый
        let CELL_SIZE = canvas.width / GRID_SIZE;
        let gameSpeed = 110;          // мс на ход
        
        let snake = [];
        let food = { x: 12, y: 12 };
        let direction = 'RIGHT';
        let nextDirection = 'RIGHT';
        let score = 0;
        let gameRunning = true;
        let gameLoopId = null;
        let lastMoveTime = 0;
        
        // Таймер сессии
        let sessionStartTime = null;   // timestamp начала текущей игры
        let sessionActive = true;      // флаг для отслеживания
        
        // Изображение яблока
        let appleImage = new Image();
        let appleLoaded = false;
        const APPLE_URL = 'https://raw.githubusercontent.com/By-Atoo/fe82ge8282/main/.res/apple.png';
        appleImage.onload = () => { appleLoaded = true; drawGame(); };
        appleImage.onerror = () => { appleLoaded = false; drawGame(); };
        appleImage.src = APPLE_URL;
        
        // ------ Вспомогательные функции ------
        function updateCellSize() {
            CELL_SIZE = canvas.width / GRID_SIZE;
        }
        
        function isPartOfSnake(x, y) {
            return snake.some(seg => seg.x === x && seg.y === y);
        }
        
        function generateValidFood() {
            const maxAttempts = 5000;
            for(let i = 0; i < maxAttempts; i++) {
                const randX = Math.floor(Math.random() * GRID_SIZE);
                const randY = Math.floor(Math.random() * GRID_SIZE);
                if(!isPartOfSnake(randX, randY)) {
                    food = { x: randX, y: randY };
                    return;
                }
            }
            for(let y = 0; y < GRID_SIZE; y++) {
                for(let x = 0; x < GRID_SIZE; x++) {
                    if(!isPartOfSnake(x, y)) {
                        food = { x, y };
                        return;
                    }
                }
            }
            gameWin(); // победа, нет места
        }
        
        function updateScoreUI() {
            scoreSpan.innerText = score;
        }
        
        // Запуск таймера сессии
        function startSessionTimer() {
            sessionStartTime = Date.now();
            sessionActive = true;
        }
        
        function getSessionDuration() {
            if(!sessionStartTime) return 0;
            return Math.floor((Date.now() - sessionStartTime) / 1000);
        }
        
        // Инициализация / сброс игры с текущими параметрами
        function initGame(resetTimer = true) {
            const center = Math.floor(GRID_SIZE / 2);
            snake = [
                { x: center, y: center },
                { x: center-1, y: center },
                { x: center-2, y: center }
            ];
            direction = 'RIGHT';
            nextDirection = 'RIGHT';
            score = 0;
            gameRunning = true;
            updateScoreUI();
            generateValidFood();
            drawGame();
            if(resetTimer) {
                startSessionTimer();
            }
        }
        
        // Логика движения
        function moveSnake() {
            if(!gameRunning) return false;
            
            let newDir = nextDirection;
            if((newDir === 'RIGHT' && direction === 'LEFT') ||
               (newDir === 'LEFT' && direction === 'RIGHT') ||
               (newDir === 'UP' && direction === 'DOWN') ||
               (newDir === 'DOWN' && direction === 'UP')) {
                newDir = direction;
            }
            direction = newDir;
            
            let newHead = { ...snake[0] };
            switch(direction) {
                case 'RIGHT': newHead.x += 1; break;
                case 'LEFT':  newHead.x -= 1; break;
                case 'UP':    newHead.y -= 1; break;
                case 'DOWN':  newHead.y += 1; break;
            }
            
            const willEat = (newHead.x === food.x && newHead.y === food.y);
            snake.unshift(newHead);
            if(!willEat) {
                snake.pop();
            } else {
                score++;
                updateScoreUI();
                generateValidFood();
            }
            
            const head = snake[0];
            if(head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                gameOver('стена');
                return false;
            }
            for(let i = 1; i < snake.length; i++) {
                if(snake[i].x === head.x && snake[i].y === head.y) {
                    gameOver('самостолкновение');
                    return false;
                }
            }
            return true;
        }
        
        function gameOver(reason) {
            if(!gameRunning) return;
            gameRunning = false;
            sessionActive = false;
            if(gameLoopId) {
                cancelAnimationFrame(gameLoopId);
                gameLoopId = null;
            }
            // показать меню смерти с временем и счётом
            const duration = getSessionDuration();
            finalScoreSpan.innerText = score;
            gameTimeSpan.innerText = duration;
            modalTitle.innerHTML = '💀 GAME OVER 💀';
            gameOverModal.classList.add('active');
            drawGame();
        }
        
        function gameWin() {
            if(!gameRunning) return;
            gameRunning = false;
            sessionActive = false;
            if(gameLoopId) {
                cancelAnimationFrame(gameLoopId);
                gameLoopId = null;
            }
            const duration = getSessionDuration();
            finalScoreSpan.innerText = score;
            gameTimeSpan.innerText = duration;
            modalTitle.innerHTML = '🏆 ПОБЕДА! 🏆';
            gameOverModal.classList.add('active');
            drawGame();
        }
        
        // ------ Отрисовка в стиле консоли (чёрный фон, зелёные линии) ------
        function drawGame() {
            if(!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // чёрный фон консоли
            ctx.fillStyle = '#041004';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // зелёная сетка
            ctx.strokeStyle = '#2eaa2e';
            ctx.lineWidth = 1.2;
            for(let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }
            
            // яблоко (текстура или пиксельный стиль)
            const fx = food.x * CELL_SIZE;
            const fy = food.y * CELL_SIZE;
            const size = CELL_SIZE;
            if(appleLoaded && appleImage.complete && appleImage.naturalWidth > 0) {
                const pad = Math.max(2, CELL_SIZE * 0.1);
                ctx.drawImage(appleImage, fx + pad, fy + pad, size - pad*2, size - pad*2);
            } else {
                ctx.fillStyle = '#ff5555';
                ctx.beginPath();
                ctx.arc(fx + size/2, fy + size/2, size/2 - 3, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#aaffaa';
                ctx.beginPath();
                ctx.arc(fx + size/2 - 3, fy + size/2 - 4, 3, 0, Math.PI*2);
                ctx.fill();
            }
            
            // змейка: светящийся зелёный
            for(let i = 0; i < snake.length; i++) {
                const seg = snake[i];
                const x = seg.x * CELL_SIZE;
                const y = seg.y * CELL_SIZE;
                const radius = Math.max(3, CELL_SIZE * 0.2);
                ctx.fillStyle = i === 0 ? '#7cfc00' : '#3cb043';
                ctx.shadowBlur = 4;
                ctx.shadowColor = '#00ff66';
                ctx.beginPath();
                ctx.roundRect(x + 2, y + 2, CELL_SIZE - 4, CELL_SIZE - 4, radius);
                ctx.fill();
                ctx.strokeStyle = '#004d00';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.roundRect(x + 2, y + 2, CELL_SIZE - 4, CELL_SIZE - 4, radius);
                ctx.stroke();
                if(i === 0) {
                    ctx.fillStyle = '#ffffff';
                    const eyeOff = CELL_SIZE * 0.25;
                    ctx.beginPath();
                    ctx.arc(x + CELL_SIZE - eyeOff, y + eyeOff, 3, 0, Math.PI*2);
                    ctx.arc(x + eyeOff, y + eyeOff, 3, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.arc(x + CELL_SIZE - eyeOff - 1, y + eyeOff - 1, 1.5, 0, Math.PI*2);
                    ctx.arc(x + eyeOff - 1, y + eyeOff - 1, 1.5, 0, Math.PI*2);
                    ctx.fill();
                }
            }
            ctx.shadowBlur = 0;
        }
        
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x+r, y);
                this.lineTo(x+w-r, y);
                this.quadraticCurveTo(x+w, y, x+w, y+r);
                this.lineTo(x+w, y+h-r);
                this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
                this.lineTo(x+r, y+h);
                this.quadraticCurveTo(x, y+h, x, y+h-r);
                this.lineTo(x, y+r);
                this.quadraticCurveTo(x, y, x+r, y);
                return this;
            };
        }
        
        // ------ Игровой цикл ------
        function gameTick(now) {
            if(!gameRunning) {
                drawGame();
                return;
            }
            if(!lastMoveTime) {
                lastMoveTime = now;
                requestAnimationFrame(gameTick);
                drawGame();
                return;
            }
            const elapsed = now - lastMoveTime;
            if(elapsed >= gameSpeed) {
                const success = moveSnake();
                lastMoveTime = now;
                drawGame();
                if(!success) {
                    if(gameLoopId) cancelAnimationFrame(gameLoopId);
                    gameLoopId = null;
                    drawGame();
                    return;
                }
            }
            drawGame();
            gameLoopId = requestAnimationFrame(gameTick);
        }
        
        function startGameLoop() {
            if(gameLoopId) cancelAnimationFrame(gameLoopId);
            lastMoveTime = 0;
            gameRunning = true;
            gameLoopId = requestAnimationFrame(gameTick);
        }
        
        // ------ Управление (свайпы + кнопки + клавиатура) ------
        function setDirection(newDir) {
            if(!gameRunning) return;
            if((newDir === 'RIGHT' && direction !== 'LEFT') ||
               (newDir === 'LEFT' && direction !== 'RIGHT') ||
               (newDir === 'UP' && direction !== 'DOWN') ||
               (newDir === 'DOWN' && direction !== 'UP')) {
                nextDirection = newDir;
            }
        }
        
        // Свайпы
        let touchStart = null;
        function handleTouchStart(e) {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            touchStart = { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
        }
        function handleTouchMove(e) {
            e.preventDefault();
            if(!touchStart || !gameRunning) return;
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const dx = (touch.clientX - rect.left) - touchStart.x;
            const dy = (touch.clientY - rect.top) - touchStart.y;
            if(Math.abs(dx) < 12 && Math.abs(dy) < 12) return;
            let newDir = null;
            if(Math.abs(dx) > Math.abs(dy)) newDir = dx > 0 ? 'RIGHT' : 'LEFT';
            else newDir = dy > 0 ? 'DOWN' : 'UP';
            if(newDir) setDirection(newDir);
            touchStart = null;
        }
        function handleTouchEnd(e) { e.preventDefault(); touchStart = null; }
        
        function handleKeydown(e) {
            if(!gameRunning) return;
            let key = e.key;
            if(key === 'ArrowUp') setDirection('UP');
            else if(key === 'ArrowDown') setDirection('DOWN');
            else if(key === 'ArrowLeft') setDirection('LEFT');
            else if(key === 'ArrowRight') setDirection('RIGHT');
            else return;
            e.preventDefault();
        }
        
        // ------ Перезапуск игры (сброс всего) ------
        function fullRestart() {
            if(gameLoopId) cancelAnimationFrame(gameLoopId);
            initGame(true);
            gameRunning = true;
            lastMoveTime = 0;
            startGameLoop();
            // закрываем модалки если открыты
            gameOverModal.classList.remove('active');
            settingsModal.classList.remove('active');
        }
        
        // ------ НАСТРОЙКИ ------
        function applySettingsAndRestart() {
            // получить новые значения
            let newGrid = parseInt(gridSizeValueSpan.innerText, 10);
            let newSpeed = parseInt(speedSlider.value, 10);
            if(isNaN(newGrid)) newGrid = GRID_SIZE;
            if(newGrid < 10) newGrid = 10;
            if(newGrid > 35) newGrid = 35;
            GRID_SIZE = newGrid;
            gameSpeed = newSpeed;
            speedValueSpan.innerText = gameSpeed;
            updateCellSize();
            // перезапуск игры
            if(gameLoopId) cancelAnimationFrame(gameLoopId);
            initGame(true);
            gameRunning = true;
            lastMoveTime = 0;
            startGameLoop();
            settingsModal.classList.remove('active');
        }
        
        function updateGridUI() {
            gridSizeValueSpan.innerText = GRID_SIZE;
        }
        
        // ------ Инициализация событий ------
        function attachEvents() {
            canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
            canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
            canvas.addEventListener('touchend', handleTouchEnd);
            window.addEventListener('keydown', handleKeydown);
            
            // сенсорные кнопки
            document.querySelectorAll('.ctrl-btn').forEach(btn => {
                const dir = btn.getAttribute('data-dir');
                if(!dir) return;
                btn.addEventListener('click', (e) => { e.preventDefault(); setDirection(dir); });
                btn.addEventListener('touchstart', (e) => { e.preventDefault(); setDirection(dir); });
            });
            
            // модальные закрытия
            document.getElementById('closeGameOverModal').onclick = () => gameOverModal.classList.remove('active');
            document.getElementById('closeSettingsModal').onclick = () => settingsModal.classList.remove('active');
            document.getElementById('restartFromDeathBtn').onclick = () => fullRestart();
            document.getElementById('openSettingsBtn').onclick = () => {
                if(gameLoopId) cancelAnimationFrame(gameLoopId);
                gameRunning = false;   // пауза
                settingsModal.classList.add('active');
                // обновить значения в окне настроек
                gridSizeValueSpan.innerText = GRID_SIZE;
                speedSlider.value = gameSpeed;
                speedValueSpan.innerText = gameSpeed;
            };
            document.getElementById('applySettingsBtn').onclick = () => applySettingsAndRestart();
            document.getElementById('resetFromSettingsBtn').onclick = () => {
                fullRestart();
                settingsModal.classList.remove('active');
            };
            document.getElementById('gridMinus').onclick = () => {
                let val = parseInt(gridSizeValueSpan.innerText,10);
                if(val > 10) gridSizeValueSpan.innerText = val-1;
            };
            document.getElementById('gridPlus').onclick = () => {
                let val = parseInt(gridSizeValueSpan.innerText,10);
                if(val < 35) gridSizeValueSpan.innerText = val+1;
            };
            speedSlider.oninput = () => {
                speedValueSpan.innerText = speedSlider.value;
            };
            // клик вне модалок не закрывает их чтобы не ошибиться, но крестик есть
        }
        
        // Старт
        function start() {
            updateCellSize();
            initGame(true);
            startGameLoop();
            attachEvents();
        }
        
        start();
    })();
</script>
</body>
</html>
