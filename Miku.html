<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Хацунэ Мику — детализированная 3D (примитивы)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050a14; font-family: 'Segoe UI', 'Arial', sans-serif; }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #aad0ff;
            background: rgba(8, 20, 40, 0.7);
            padding: 10px 20px;
            border-radius: 40px;
            backdrop-filter: blur(8px);
            pointer-events: none;
            font-size: 15px;
            border-left: 4px solid #00ccff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 10;
        }
        #note {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #b0caf0;
            background: rgba(15, 30, 50, 0.6);
            padding: 8px 18px;
            border-radius: 30px;
            backdrop-filter: blur(6px);
            font-size: 13px;
            pointer-events: none;
            z-index: 10;
            border-right: 3px solid #88aaff;
        }
        .controls-hint {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #ccddff;
            background: rgba(10, 25, 45, 0.5);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            backdrop-filter: blur(5px);
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="info">🎤 初音ミク — Hatsune Miku · Детализированная модель (примитивы, без текстур)</div>
    <div id="note">✨ Авто-вращение · Мышь: вращать / зум</div>
    <div class="controls-hint">🖱️ ЛКМ — вращать · ПКМ — панорама · Колесо — зум</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- Инициализация сцены с улучшенным фоном ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x060b16); // очень тёмный синий
        
        // Глубокий туман
        scene.fog = new THREE.FogExp2(0x060b16, 0.008);

        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5.5, 3.2, 9);
        camera.lookAt(0, 2.6, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; // мягкие тени
        renderer.outputEncoding = THREE.sRGBEncoding; // для более ярких цветов
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.1;
        document.body.appendChild(renderer.domElement);

        // CSS2 рендерер для текстовых подписей
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        // --- Управление камерой с авто-вращением ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.0;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.panSpeed = 0.5;
        controls.target.set(0, 2.6, 0);
        controls.maxPolarAngle = Math.PI / 2.1;
        controls.minDistance = 4.0;
        controls.maxDistance = 14.0;

        // --- Освещение: многослойное, с акцентами ---
        // 1. Базовый ambient
        scene.add(new THREE.AmbientLight(0x404c66, 0.4));
        
        // 2. Ключевой свет (слева-спереди, тёплый)
        const keyLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        keyLight.position.set(-4, 7, 5);
        keyLight.castShadow = true;
        keyLight.receiveShadow = true;
        keyLight.shadow.mapSize.width = 2048;
        keyLight.shadow.mapSize.height = 2048;
        const d = 9;
        keyLight.shadow.camera.left = -d;
        keyLight.shadow.camera.right = d;
        keyLight.shadow.camera.top = d;
        keyLight.shadow.camera.bottom = -d;
        keyLight.shadow.camera.near = 1;
        keyLight.shadow.camera.far = 25;
        keyLight.shadow.bias = -0.0008;
        keyLight.shadow.normalBias = 0.02;
        scene.add(keyLight);
        
        // 3. Заполняющий свет справа (холодный)
        const fillLight = new THREE.DirectionalLight(0xaaccff, 0.8);
        fillLight.position.set(5, 4, 3);
        fillLight.castShadow = true;
        fillLight.shadow.mapSize.width = 1024;
        fillLight.shadow.mapSize.height = 1024;
        fillLight.shadow.camera.left = -5;
        fillLight.shadow.camera.right = 5;
        fillLight.shadow.camera.top = 5;
        fillLight.shadow.camera.bottom = -5;
        fillLight.shadow.bias = -0.0005;
        scene.add(fillLight);
        
        // 4. Контровой свет сзади (бирюзовый оттенок для волос)
        const backLight = new THREE.PointLight(0x88ccff, 0.9);
        backLight.position.set(-1, 4, -7);
        scene.add(backLight);
        
        // 5. Нижняя подсветка (розоватая)
        const bottomLight = new THREE.PointLight(0xffaacc, 0.5);
        bottomLight.position.set(0, 0.5, 4);
        scene.add(bottomLight);
        
        // 6. Акцент на лицо
        const faceLight = new THREE.PointLight(0xffeedd, 0.5);
        faceLight.position.set(1, 3.5, 4);
        scene.add(faceLight);
        
        // 7. Дополнительный свет для волос
        const hairLight = new THREE.PointLight(0x88ddff, 0.7);
        hairLight.position.set(-2, 4.5, 2);
        scene.add(hairLight);

        // --- Окружение: платформа, сетка, декоративные элементы ---
        const gridHelper = new THREE.GridHelper(20, 30, 0x4488ff, 0x1a3355);
        gridHelper.position.y = -0.01;
        scene.add(gridHelper);
        
        // Стилизованная сцена-подиум
        const podiumMat = new THREE.MeshStandardMaterial({ color: 0x1e2f4a, roughness: 0.6, metalness: 0.1, emissive: new THREE.Color(0x102030) });
        const podiumBase = new THREE.Mesh(new THREE.CylinderGeometry(3.8, 3.8, 0.25, 64), podiumMat);
        podiumBase.position.y = -0.15;
        podiumBase.receiveShadow = true;
        podiumBase.castShadow = false;
        scene.add(podiumBase);
        
        const podiumRing = new THREE.Mesh(new THREE.TorusGeometry(3.6, 0.06, 16, 64), new THREE.MeshStandardMaterial({ color: 0x88aadd, roughness: 0.3, metalness: 0.5, emissive: new THREE.Color(0x113355) }));
        podiumRing.position.y = 0.02;
        podiumRing.rotation.x = Math.PI / 2;
        podiumRing.receiveShadow = true;
        scene.add(podiumRing);
        
        // Неоновые акценты по кругу
        const glowRingMat = new THREE.MeshStandardMaterial({ color: 0x44aaff, emissive: new THREE.Color(0x2266aa), transparent: true, opacity: 0.25 });
        const glowRing = new THREE.Mesh(new THREE.TorusGeometry(3.2, 0.03, 8, 64), glowRingMat);
        glowRing.position.y = 0.15;
        glowRing.rotation.x = Math.PI / 2;
        scene.add(glowRing);
        
        // Парящие светящиеся сферы
        const orbGroup = new THREE.Group();
        const orbMat = new THREE.MeshStandardMaterial({ color: 0x88ccff, emissive: new THREE.Color(0x224466), roughness: 0.2 });
        for (let i = 0; i < 8; i++) {
            const orb = new THREE.Mesh(new THREE.SphereGeometry(0.12, 12, 12), orbMat);
            const angle = (i / 8) * Math.PI * 2;
            orb.position.set(Math.cos(angle)*3.4, 0.25 + Math.sin(i*1.5)*0.1, Math.sin(angle)*3.4);
            orb.castShadow = true;
            orb.receiveShadow = true;
            orbGroup.add(orb);
        }
        scene.add(orbGroup);
        
        // Звёзды (частицы фона)
        const starsGeo = new THREE.BufferGeometry();
        const starsCount = 400;
        const starPositions = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount * 3; i += 3) {
            const r = 15 + Math.random() * 20;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            starPositions[i] = Math.sin(phi) * Math.cos(theta) * r;
            starPositions[i+1] = Math.sin(phi) * Math.sin(theta) * r * 0.8;
            starPositions[i+2] = Math.cos(phi) * r;
        }
        starsGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starsMat = new THREE.PointsMaterial({ color: 0xcce5ff, size: 0.06, transparent: true, opacity: 0.9 });
        const stars = new THREE.Points(starsGeo, starsMat);
        scene.add(stars);

        // --- ГРУППА МОДЕЛИ МИКУ ---
        const miku = new THREE.Group();
        miku.position.y = 0;
        scene.add(miku);

        // ----- МАТЕРИАЛЫ (цвета подобраны тщательно) -----
        const skinMat = new THREE.MeshStandardMaterial({ color: 0xffe5cc, roughness: 0.45, emissive: new THREE.Color(0x332211).multiplyScalar(0.03) });
        const hairBaseMat = new THREE.MeshStandardMaterial({ color: 0x3dd4c0, roughness: 0.4, emissive: new THREE.Color(0x115555).multiplyScalar(0.08) });
        const hairDarkMat = new THREE.MeshStandardMaterial({ color: 0x2bb5a0, roughness: 0.5 });
        const hairLightMat = new THREE.MeshStandardMaterial({ color: 0x6ef0e0, roughness: 0.35, emissive: new THREE.Color(0x227777).multiplyScalar(0.05) });
        const shirtMat = new THREE.MeshStandardMaterial({ color: 0xf5f5fa, roughness: 0.6 });
        const skirtMat = new THREE.MeshStandardMaterial({ color: 0x3a4e6b, roughness: 0.65 });
        const tieMat = new THREE.MeshStandardMaterial({ color: 0xd44, roughness: 0.45, emissive: new THREE.Color(0x330000).multiplyScalar(0.1) });
        const sleeveMat = new THREE.MeshStandardMaterial({ color: 0xe8e8f0, roughness: 0.6 });
        const armWarmerMat = new THREE.MeshStandardMaterial({ color: 0x2a2e3d, roughness: 0.7 });
        const shoeMat = new THREE.MeshStandardMaterial({ color: 0x2c4058, roughness: 0.6 });
        const soleMat = new THREE.MeshStandardMaterial({ color: 0x1a1f2a, roughness: 0.8 });
        const eyeWhiteMat = new THREE.MeshStandardMaterial({ color: 0xf0f5ff, roughness: 0.3 });
        const irisMat = new THREE.MeshStandardMaterial({ color: 0x5cb8d9, roughness: 0.2, emissive: new THREE.Color(0x113344).multiplyScalar(0.2) });
        const pupilMat = new THREE.MeshStandardMaterial({ color: 0x0a121c, roughness: 0.1 });
        const mouthMat = new THREE.MeshStandardMaterial({ color: 0xb85c6a, roughness: 0.5 });
        const ribbonMat = new THREE.MeshStandardMaterial({ color: 0xe64555, roughness: 0.4 });
        const metalMat = new THREE.MeshStandardMaterial({ color: 0xaaccdd, roughness: 0.25, metalness: 0.7 });
        
        // Вспомогательная функция
        function addPart(mesh, castShadow = true, receiveShadow = true) {
            mesh.castShadow = castShadow;
            mesh.receiveShadow = receiveShadow;
            return mesh;
        }

        // ========== ТЕЛО ==========
        // Шея
        const neck = addPart(new THREE.Mesh(new THREE.CylinderGeometry(0.38, 0.4, 0.5, 10), skinMat));
        neck.position.y = 2.0;
        neck.position.z = 0.0;
        miku.add(neck);
        
        // Торс (верх)
        const torso = addPart(new THREE.Mesh(new THREE.CylinderGeometry(0.9, 0.95, 1.5, 12), shirtMat));
        torso.position.y = 1.2;
        torso.position.z = 0.0;
        miku.add(torso);
        
        // Грудь (две полусферы)
        const chestL = addPart(new THREE.Mesh(new THREE.SphereGeometry(0.32, 12, 10), shirtMat));
        chestL.position.set(-0.48, 1.55, 0.45);
        chestL.scale.set(0.9, 0.7, 0.6);
        miku.add(chestL);
        const chestR = addPart(new THREE.Mesh(new THREE.SphereGeometry(0.32, 12, 10), shirtMat));
        chestR.position.set(0.48, 1.55, 0.45);
        chestR.scale.set(0.9, 0.7, 0.6);
        miku.add(chestR);
        
        // Воротник
        const collarMat = new THREE.MeshStandardMaterial({ color: 0xddeeff });
        const collarBack = addPart(new THREE.Mesh(new THREE.TorusGeometry(0.5, 0.08, 8, 20), collarMat));
        collarBack.position.set(0, 1.75, -0.2);
        collarBack.rotation.x = 0.3;
        collarBack.rotation.y = 0;
        collarBack.rotation.z = 0;
        miku.add(collarBack);
        
        // Юбка (плиссированная имитация с помощью нескольких конусов)
        const skirtBase = addPart(new THREE.Mesh(new THREE.ConeGeometry(1.2, 1.0, 12), skirtMat));
        skirtBase.position.y = 0.65;
        skirtBase.position.z = 0.0;
        skirtBase.rotation.y = Math.PI/12;
        miku.add(skirtBase);
        
        // Пояс юбки
        const belt = addPart(new THREE.Mesh(new THREE.TorusGeometry(1.0, 0.1, 8, 24), new THREE.MeshStandardMaterial({ color: 0x5a6b8a })));
        belt.position.y = 0.75;
        belt.rotation.x = Math.PI/2;
        belt.rotation.z = 0;
        miku.add(belt);
        
        // Галстук (детальный)
        const tieKnot = addPart(new THREE.Mesh(new THREE.SphereGeometry(0.2, 8), tieMat));
        tieKnot.position.set(0.0, 1.45, 0.8);
        miku.add(tieKnot);
        const tieLeft = addPart(new THREE.Mesh(new THREE.ConeGeometry(0.22, 0.65, 8), tieMat));
        tieLeft.position.set(-0.28, 1.15, 0.75);
        tieLeft.rotation.z = 0.35;
        tieLeft.rotation.x = 0.2;
        miku.add(tieLeft);
        const tieRight = addPart(new THREE.Mesh(new THREE.ConeGeometry(0.22, 0.65, 8), tieMat));
        tieRight.position.set(0.28, 1.15, 0.75);
        tieRight.rotation.z = -0.35;
        tieRight.rotation.x = 0.2;
        miku.add(tieRight);
        const tieCenter = addPart(new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.15, 0.45, 6), tieMat));
        tieCenter.position.set(0.0, 1.25, 0.85);
        tieCenter.rotation.x = 0.15;
        miku.add(tieCenter);

        // ========== ГОЛОВА ==========
        const headGroup = new THREE.Group();
        headGroup.position.y = 2.4;
        headGroup.position.z = 0.0;
        miku.add(headGroup);
        
        // Основа головы
        const headMain = addPart(new THREE.Mesh(new THREE.SphereGeometry(0.72, 32, 24), skinMat));
        headMain.position.y = 0.0;
        headMain.scale.set(0.98, 1.0, 0.92);
        headGroup.add(headMain);
        
        // Лицевая часть (выдаётся вперёд)
        const facePatch = addPart(new THREE.Mesh(new THREE.SphereGeometry(0.58, 20, 16), skinMat));
        facePatch.position.set(0.0, -0.02, 0.4);
        facePatch.scale.set(0.95, 0.9, 0.5);
        headGroup.add(facePatch);
        
        // Глаза (белки)
        const eyeL = addPart(new THREE.Mesh(new THREE.SphereGeometry(0.18, 16), eyeWhiteMat));
        eyeL.position.set(-0.32, 0.18, 0.78);
        headGroup.add(eyeL);
        const eyeR = addPart(new THREE.Mesh(new THREE.SphereGeometry(0.18, 16), eyeWhiteMat));
        eyeR.position.set(0.32, 0.18, 0.78);
        headGroup.add(eyeR);
        
        // Радужки
        const irisL = addPart(new THREE.Mesh(new THREE.SphereGeometry(0.12, 12), irisMat));
        irisL.position.set(-0.32, 0.15, 0.9);
        headGroup.add(irisL);
        const irisR = addPart(new THREE.Mesh(new THREE.SphereGeometry(0.12, 12), irisMat));
        irisR.position.set(0.32, 0.15, 0.9);
        headGroup.add(irisR);
        
        // Зрачки
        const pupilL = addPart(new THREE.Mesh(new THREE.SphereGeometry(0.07, 8), pupilMat));
        pupilL.position.set(-0.32, 0.13, 0.98);
        headGroup.add(pupilL);
        const pupilR = addPart(new THREE.Mesh(new THREE.SphereGeometry(0.07, 8), pupilMat));
        pupilR.position.set(0.32, 0.13, 0.98);
        headGroup.add(pupilR);
        
        // Блики
        const highlightMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: new THREE.Color(0xaaaaaa) });
        const hlL = addPart(new THREE.Mesh(new THREE.SphereGeometry(0.04, 6), highlightMat));
        hlL.position.set(-0.36, 0.21, 1.02);
        headGroup.add(hlL);
        const hlR = addPart(new THREE.Mesh(new THREE.SphereGeometry(0.04, 6), highlightMat));
        hlR.position.set(0.28, 0.21, 1.02);
        headGroup.add(hlR);
        
        // Ресницы (маленькие чёрные полоски)
        const lashMat = new THREE.MeshStandardMaterial({ color: 0x111122 });
        const lashL = addPart(new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.03, 0.03), lashMat));
        lashL.position.set(-0.32, 0.3, 0.82);
        lashL.rotation.z = 0.05;
        headGroup.add(lashL);
        const lashR = addPart(new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.03, 0.03), lashMat));
        lashR.position.set(0.32, 0.3, 0.82);
        lashR.rotation.z = -0.05;
        headGroup.add(lashR);
        
        // Рот (улыбка из тора)
        const mouth = addPart(new THREE.Mesh(new THREE.TorusGeometry(0.13, 0.04, 8, 20, Math.PI), mouthMat));
        mouth.position.set(0.0, -0.06, 0.82);
        mouth.rotation.x = 0.25;
        mouth.rotation.z = 0.05;
        mouth.rotation.y = 0.0;
        mouth.scale.set(1.0, 0.6, 0.4);
        headGroup.add(mouth);
        
        // Румянец
        const blushMat = new THREE.MeshStandardMaterial({ color: 0xffaaaa, transparent: true, opacity: 0.45 });
        const blushL = addPart(new THREE.Mesh(new THREE.SphereGeometry(0.12, 8), blushMat));
        blushL.position.set(-0.48, -0.05, 0.75);
        blushL.scale.set(0.8, 0.5, 0.2);
        headGroup.add(blushL);
        const blushR = addPart(new THREE.Mesh(new THREE.SphereGeometry(0.12, 8), blushMat));
        blushR.position.set(0.48, -0.05, 0.75);
        blushR.scale.set(0.8, 0.5, 0.2);
        headGroup.add(blushR);
        
        // ========== ВОЛОСЫ (очень детальные) ==========
        // Основная масса волос
        const hairBase = addPart(new THREE.Mesh(new THREE.SphereGeometry(0.78, 16, 12), hairBaseMat));
        hairBase.position.set(0.0, 0.3, -0.15);
        hairBase.scale.set(1.12, 0.95, 0.98);
        headGroup.add(hairBase);
        
        // Чёлка (несколько слоёв)
        const bangs1 = addPart(new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.55, 0.3, 8), hairBaseMat));
        bangs1.position.set(0.0, 0.5, 0.5);
        bangs1.rotation.x = 0.4;
        bangs1.rotation.z = 0.0;
        bangs1.scale.set(1.15, 0.6, 0.85);
        headGroup.add(bangs1);
        
        const bangs2 = addPart(new THREE.Mesh(new THREE.SphereGeometry(0.28, 8), hairLightMat));
        bangs2.position.set(-0.32, 0.4, 0.6);
        bangs2.scale.set(0.9, 0.55, 0.5);
        headGroup.add(bangs2);
        const bangs3 = addPart(new THREE.Mesh(new THREE.SphereGeometry(0.28, 8), hairLightMat));
        bangs3.position.set(0.32, 0.4, 0.6);
        bangs3.scale.set(0.9, 0.55, 0.5);
        headGroup.add(bangs3);
        
        // Боковые пряди
        const sideHairL = addPart(new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.25, 0.9, 7), hairBaseMat));
        sideHairL.position.set(-0.72, 0.2, 0.25);
        sideHairL.rotation.z = 0.3;
        sideHairL.rotation.x = -0.15;
        headGroup.add(sideHairL);
        const sideHairR = addPart(new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.25, 0.9, 7), hairBaseMat));
        sideHairR.position.set(0.72, 0.2, 0.25);
        sideHairR.rotation.z = -0.3;
        sideHairR.rotation.x = -0.15;
        headGroup.add(sideHairR);
        
        // Хвосты (группы)
        const tailL = new THREE.Group();
        tailL.position.set(-0.55, 0.9, -0.15);
        headGroup.add(tailL);
        const tailR = new THREE.Group();
        tailR.position.set(0.55, 0.9, -0.15);
        headGroup.add(tailR);
        
        // Левый хвост (детально)
        const tailBaseL = addPart(new THREE.Mesh(new THREE.SphereGeometry(0.5, 12), hairBaseMat));
        tailBaseL.position.y = 0.25;
        tailBaseL.scale.set(1.0, 1.3, 0.9);
        tailL.add(tailBaseL);
        
        const tailSeg1L = addPart(new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.5, 1.0, 9), hairBaseMat));
        tailSeg1L.position.y = -0.45;
        tailSeg1L.rotation.x = 0.12;
        tailSeg1L.rotation.z = -0.18;
        tailL.add(tailSeg1L);
        
        const tailSeg2L = addPart(new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.45, 1.0, 9), hairBaseMat));
        tailSeg2L.position.y = -1.05;
        tailSeg2L.rotation.x = 0.18;
        tailSeg2L.rotation.z = -0.12;
        tailL.add(tailSeg2L);
        
        const tailTipL = addPart(new THREE.Mesh(new THREE.ConeGeometry(0.35, 0.75, 8), hairDarkMat));
        tailTipL.position.y = -1.7;
        tailTipL.rotation.x = 0.15;
        tailL.add(tailTipL);
        
        // Правый хвост
        const tailBaseR = addPart(new THREE.Mesh(new THREE.SphereGeometry(0.5, 12), hairBaseMat));
        tailBaseR.position.y = 0.25;
        tailBaseR.scale.set(1.0, 1.3, 0.9);
        tailR.add(tailBaseR);
        
        const tailSeg1R = addPart(new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.5, 1.0, 9), hairBaseMat));
        tailSeg1R.position.y = -0.45;
        tailSeg1R.rotation.x = 0.12;
        tailSeg1R.rotation.z = 0.18;
        tailR.add(tailSeg1R);
        
        const tailSeg2R = addPart(new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.45, 1.0, 9), hairBaseMat));
        tailSeg2R.position.y = -1.05;
        tailSeg2R.rotation.x = 0.18;
        tailSeg2R.rotation.z = 0.12;
        tailR.add(tailSeg2R);
        
        const tailTipR = addPart(new THREE.Mesh(new THREE.ConeGeometry(0.35, 0.75, 8), hairDarkMat));
        tailTipR.position.y = -1.7;
        tailTipR.rotation.x = 0.15;
        tailR.add(tailTipR);
        
        // Ленточки на хвостах
        const ribbonL = addPart(new THREE.Mesh(new THREE.TorusGeometry(0.48, 0.08, 8, 16), ribbonMat));
        ribbonL.position.y = -0.1;
        ribbonL.rotation.y = 0.4;
        ribbonL.rotation.x = 0.25;
        tailL.add(ribbonL);
        const ribbonR = addPart(new THREE.Mesh(new THREE.TorusGeometry(0.48, 0.08, 8, 16), ribbonMat));
        ribbonR.position.y = -0.1;
        ribbonR.rotation.y = -0.4;
        ribbonR.rotation.x = 0.25;
        tailR.add(ribbonR);
        
        // Наушники (характерный аксессуар Мику)
        const headphoneBand = addPart(new THREE.Mesh(new THREE.TorusGeometry(0.75, 0.06, 8, 24), new THREE.MeshStandardMaterial({ color: 0x3a4a5a, roughness: 0.5 })));
        headphoneBand.position.y = 0.25;
        headphoneBand.rotation.x = Math.PI/2;
        headphoneBand.rotation.z = 0.1;
        headGroup.add(headphoneBand);
        
        const hpCupL = addPart(new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.15, 12), new THREE.MeshStandardMaterial({ color: 0x2a3a4a })));
        hpCupL.position.set(-0.85, 0.25, 0.0);
        hpCupL.rotation.z = 0.1;
        headGroup.add(hpCupL);
        const hpCupR = addPart(new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.15, 12), new THREE.MeshStandardMaterial({ color: 0x2a3a4a })));
        hpCupR.position.set(0.85, 0.25, 0.0);
        hpCupR.rotation.z = -0.1;
        headGroup.add(hpCupR);
        
        // ========== РУКИ ==========
        // Плечи
        const shoulderL = addPart(new THREE.Mesh(new THREE.SphereGeometry(0.35, 10), sleeveMat));
        shoulderL.position.set(-1.05, 1.8, 0.0);
        miku.add(shoulderL);
        const shoulderR = addPart(new THREE.Mesh(new THREE.SphereGeometry(0.35, 10), sleeveMat));
        shoulderR.position.set(1.05, 1.8, 0.0);
        miku.add(shoulderR);
        
        // Верхняя часть руки
        const armUpL = addPart(new THREE.Mesh(new THREE.CylinderGeometry(0.26, 0.28, 1.0, 8), sleeveMat));
        armUpL.position.set(-1.4, 1.35, 0.0);
        armUpL.rotation.z = 0.35;
        armUpL.rotation.x = 0.1;
        miku.add(armUpL);
        const armUpR = addPart(new THREE.Mesh(new THREE.CylinderGeometry(0.26, 0.28, 1.0, 8), sleeveMat));
        armUpR.position.set(1.4, 1.35, 0.0);
        armUpR.rotation.z = -0.35;
        armUpR.rotation.x = 0.1;
        miku.add(armUpR);
        
        // Предплечья (нарукавники)
        const armLowL = addPart(new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.24, 0.9, 8), armWarmerMat));
        armLowL.position.set(-1.85, 0.85, 0.1);
        armLowL.rotation.z = 0.55;
        armLowL.rotation.x = 0.2;
        miku.add(armLowL);
        const armLowR = addPart(new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.24, 0.9, 8), armWarmerMat));
        armLowR.position.set(1.85, 0.85, 0.1);
        armLowR.rotation.z = -0.55;
        armLowR.rotation.x = 0.2;
        miku.add(armLowR);
        
        // Кисти
        const handL = addPart(new THREE.Mesh(new THREE.SphereGeometry(0.22, 8), skinMat));
        handL.position.set(-2.15, 0.45, 0.15);
        miku.add(handL);
        const handR = addPart(new THREE.Mesh(new THREE.SphereGeometry(0.22, 8), skinMat));
        handR.position.set(2.15, 0.45, 0.15);
        miku.add(handR);
        
        // ========== НОГИ ==========
        const thighL = addPart(new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.34, 1.0, 8), skirtMat));
        thighL.position.set(-0.45, 0.2, 0.0);
        miku.add(thighL);
        const thighR = addPart(new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.34, 1.0, 8), skirtMat));
        thighR.position.set(0.45, 0.2, 0.0);
        miku.add(thighR);
        
        const legL = addPart(new THREE.Mesh(new THREE.CylinderGeometry(0.24, 0.26, 1.0, 8), new THREE.MeshStandardMaterial({ color: 0x1e2a38 })));
        legL.position.set(-0.45, -0.45, 0.0);
        miku.add(legL);
        const legR = addPart(new THREE.Mesh(new THREE.CylinderGeometry(0.24, 0.26, 1.0, 8), new THREE.MeshStandardMaterial({ color: 0x1e2a38 })));
        legR.position.set(0.45, -0.45, 0.0);
        miku.add(legR);
        
        // Ботинки
        const shoeL = addPart(new THREE.Mesh(new THREE.BoxGeometry(0.48, 0.22, 0.7), shoeMat));
        shoeL.position.set(-0.45, -1.0, 0.1);
        miku.add(shoeL);
        const shoeR = addPart(new THREE.Mesh(new THREE.BoxGeometry(0.48, 0.22, 0.7), shoeMat));
        shoeR.position.set(0.45, -1.0, 0.1);
        miku.add(shoeR);
        
        const soleL = addPart(new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.08, 0.75), soleMat));
        soleL.position.set(-0.45, -1.12, 0.1);
        miku.add(soleL);
        const soleR = addPart(new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.08, 0.75), soleMat));
        soleR.position.set(0.45, -1.12, 0.1);
        miku.add(soleR);
        
        // ========== МИКРОФОН (детальный) ==========
        const micGroup = new THREE.Group();
        micGroup.position.set(1.9, 1.0, 0.6);
        micGroup.rotation.z = -0.35;
        micGroup.rotation.x = 0.15;
        miku.add(micGroup);
        
        const micHandle = addPart(new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.09, 0.9, 8), new THREE.MeshStandardMaterial({ color: 0xccccdd, roughness: 0.3, metalness: 0.5 })));
        micHandle.position.y = 0.45;
        micGroup.add(micHandle);
        
        const micHead = addPart(new THREE.Mesh(new THREE.SphereGeometry(0.22, 12), new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.4, metalness: 0.1 })));
        micHead.position.y = 0.95;
        micGroup.add(micHead);
        
        const micRing = addPart(new THREE.Mesh(new THREE.TorusGeometry(0.2, 0.04, 8, 16), metalMat));
        micRing.position.y = 0.95;
        micRing.rotation.y = 0.3;
        micRing.rotation.x = 0.8;
        micGroup.add(micRing);
        
        const micTop = addPart(new THREE.Mesh(new THREE.ConeGeometry(0.1, 0.15, 8), new THREE.MeshStandardMaterial({ color: 0x555555 })));
        micTop.position.y = 1.12;
        micGroup.add(micTop);
        
        // ========== ТЕКСТОВАЯ ПОДПИСЬ (CSS2D) ==========
        const labelDiv = document.createElement('div');
        labelDiv.textContent = '初音ミク';
        labelDiv.style.color = '#a0e0ff';
        labelDiv.style.fontSize = '28px';
        labelDiv.style.fontWeight = 'bold';
        labelDiv.style.textShadow = '0 0 20px #00aaff, 0 0 40px #0066cc';
        labelDiv.style.fontFamily = 'Segoe UI, Arial, sans-serif';
        labelDiv.style.pointerEvents = 'none';
        labelDiv.style.userSelect = 'none';
        
        const labelObj = new CSS2DObject(labelDiv);
        labelObj.position.set(0, 4.2, 0);
        miku.add(labelObj);
        
        // Небольшие плавающие ноты (частицы)
        const notesGroup = new THREE.Group();
        const noteMat = new THREE.MeshStandardMaterial({ color: 0x88ddff, emissive: new THREE.Color(0x226688), transparent: true });
        for (let i = 0; i < 5; i++) {
            const note = new THREE.Mesh(new THREE.SphereGeometry(0.06, 4), noteMat);
            note.position.set(Math.sin(i)*1.2, 2.5 + i*0.3, Math.cos(i*2)*1.5);
            notesGroup.add(note);
        }
        miku.add(notesGroup);

        // --- АНИМАЦИЯ ---
        const clock = new THREE.Clock();
        
        function animate() {
            const delta = clock.getDelta();
            const time = performance.now() * 0.001;
            
            controls.update();
            
            // Покачивание хвостов
            if (tailL && tailR) {
                tailL.rotation.z = -0.12 + Math.sin(time * 2.3) * 0.06;
                tailL.rotation.x = 0.1 + Math.sin(time * 1.9) * 0.04;
                tailR.rotation.z = 0.12 + Math.sin(time * 2.3 + 2) * 0.06;
                tailR.rotation.x = 0.1 + Math.sin(time * 1.9 + 2) * 0.04;
            }
            
            // Лёгкое движение рук
            if (armUpL) {
                armUpL.rotation.z = 0.35 + Math.sin(time * 1.5) * 0.03;
                armUpR.rotation.z = -0.35 + Math.sin(time * 1.5 + 3) * 0.03;
            }
            
            // Вращение звёзд и орбит
            stars.rotation.y += 0.0008;
            orbGroup.rotation.y += 0.005;
            notesGroup.rotation.y += 0.01;
            
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            
            requestAnimationFrame(animate);
        }
        
        animate();

        // --- РЕСАЙЗ ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        console.log('%c🎤 初音ミク — детализированная 3D модель (примитивы)', 'font-size:16px; background:#0a1f2e; color:#aad0ff; padding:6px 12px; border-radius:6px;');
    </script>
</body>
</html>
