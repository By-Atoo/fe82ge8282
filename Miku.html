<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Miku's Digital World! 🎤</title>
    <style>
        body {
            background-color: #e0f7fa; /* Нежно-бирюзовый фон */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #3949ab;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0, 255, 200, 0.3);
            border: 5px solid #39ffc2;
        }
        h1 {
            color: #00bcd4;
            font-size: 2.5em;
            text-shadow: 2px 2px #fff;
        }
        .miku-img {
            width: 200px;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 3px solid #39ffc2;
        }
        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .btn {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            background: linear-gradient(45deg, #00bcd4, #39ffc2);
            color: white;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px #39ffc2;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Сюда вставь ссылку на мою картинку с GitHub! -->
        <img src="ССЫЛКА_НА_ТВОЮ_КАРТИНКУ_С_ГИТХАБА" alt="Miku-chan!" class="miku-img">
        
        <h1>Konnichiwa! Я — Хацунэ Мику! 🎶</h1>
        <p>Добро пожаловать в мой маленький уголок интернета! ✨</p>
        
        <div class="button-group">
            <button class="btn" onclick="alert('Скоро здесь будет моя лучшая песня! 🎤')">Послушать музыку</button>
            <button class="btn" onclick="alert('Я очень люблю лук-порей! 🥬')">Секретный факт</button>
        </div>
    </div>

</body>
</html>
