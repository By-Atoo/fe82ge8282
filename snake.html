<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Змейка</title>
    <link rel="icon" href="https://raw.githubusercontent.com/By-Atoo/fe82ge8282/main/.res/apple.png" type="image/png">
    <style>
        * {
            user-select: none;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', monospace;
            padding: 16px;
            overflow-x: hidden;
        }

        .rainbow-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            transition: background 1.5s ease;
        }

        .overlay-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.2) 100%);
            pointer-events: none;
            z-index: -1;
        }

        .game-container {
            width: 100%;
            max-width: 1200px;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-console {
            background: rgba(10, 15, 8, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 16px 18px 18px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.6), inset 0 1px 2px rgba(255,255,200,0.2);
            width: auto;
        }

        .game-layout {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .canvas-area {
            min-width: 260px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: #0a1f0a;
            border-radius: 28px;
            box-shadow: 0 0 0 4px #ffe6b3, 0 12px 25px black;
            cursor: pointer;
            aspect-ratio: 1 / 1;
        }

        @media (max-width: 900px) {
            canvas {
                max-width: 85vw;
                max-height: 85vw;
                width: auto;
            }
        }

        @media (min-width: 901px) {
            canvas {
                max-width: 550px;
                max-height: 550px;
                width: 550px;
                height: 550px;
            }
        }

        .touch-panel {
            margin-top: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .arrow-row {
            display: flex;
            justify-content: center;
            gap: 18px;
        }

        .ctrl-btn {
            background: #1e2a1aee;
            backdrop-filter: blur(6px);
            border: none;
            font-size: 38px;
            font-weight: bold;
            padding: 6px 22px;
            border-radius: 60px;
            box-shadow: 0 6px 0 #0e3b0e;
            transition: 0.05s linear;
            cursor: pointer;
            color: #ffffcc;
            min-width: 80px;
            font-family: monospace;
        }

        .ctrl-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #0e3b0e;
        }

        @media (min-width: 901px) {
            .touch-panel {
                display: none;
            }
        }

        .sidebar {
            flex: 1;
            min-width: 130px;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 18px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            border: 1px solid #ffda88;
        }

        .score-console {
            text-align: center;
            background: #000000aa;
            width: 100%;
            border-radius: 36px;
            padding: 8px 5px;
            border-bottom: 2px solid #ffcc55;
        }

        .score-label {
            font-size: 14px;
            color: #ffe6b3;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .score-value {
            font-size: 36px;
            font-weight: bold;
            color: #ffffcc;
            text-shadow: 0 0 6px #ffaa44;
            font-family: monospace;
            line-height: 1;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            align-items: center;
        }

        .settings-btn, .external-btn {
            background: #ffb347dd;
            border: none;
            font-size: 28px;
            cursor: pointer;
            padding: 8px;
            border-radius: 60px;
            width: 70px;
            transition: 0.08s linear;
            box-shadow: 0 5px 0 #9b551a;
            color: #2c1c0a;
            text-align: center;
            text-decoration: none;
            display: inline-block;
        }

        .external-btn {
            background: #5a7a4add;
            box-shadow: 0 5px 0 #2e4a2e;
            font-size: 24px;
            width: 70px;
        }
        
        .leaderboard-btn {
            background: #4a6a4add;
            box-shadow: 0 5px 0 #2e4a2e;
            font-size: 28px;
            width: 70px;
        }

        .settings-btn:active, .external-btn:active, .leaderboard-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #9b551a;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.2s;
        }

        .modal.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-content {
            background: #0f1a0f;
            border-radius: 56px;
            padding: 20px 24px 28px;
            max-width: 340px;
            width: 85%;
            text-align: center;
            border: 2px solid #ffdd77;
            box-shadow: 0 0 35px #ffbb44;
            color: #ffffdd;
            position: relative;
        }

        .modal-close-row {
            text-align: right;
            margin-bottom: 6px;
        }
        .modal-close {
            font-size: 28px;
            cursor: pointer;
            color: #ffdd99;
            display: inline-block;
            line-height: 1;
            transition: 0.1s;
            padding: 0 6px;
        }
        .modal-close:hover {
            color: #ffaa55;
            transform: scale(1.1);
        }

        .modal-content h2 {
            font-size: 30px;
            margin: 0 0 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .modal-stats {
            font-size: 22px;
            margin: 18px 0;
            background: #00000099;
            padding: 12px;
            border-radius: 40px;
        }

        .modal-stats p {
            margin: 8px 0;
        }

        .modal-btn {
            background: #ffb347;
            border: none;
            font-size: 22px;
            font-weight: bold;
            padding: 10px 16px;
            border-radius: 60px;
            font-family: monospace;
            cursor: pointer;
            margin-top: 14px;
            width: 100%;
            box-shadow: 0 5px 0 #9b551a;
            transition: 0.05s linear;
        }

        .modal-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #9b551a;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 18px 0;
            gap: 12px;
            flex-wrap: wrap;
        }

        .setting-row label {
            font-size: 16px;
            font-weight: bold;
        }

        input[type="range"] {
            flex: 2;
            min-width: 130px;
        }

        .value-display {
            background: black;
            padding: 3px 10px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 14px;
        }

        .hotkeys-hint {
            text-align: center;
            font-size: 11px;
            color: #bbaa77;
            margin-top: 12px;
            background: #00000066;
            display: inline-block;
            width: auto;
            padding: 3px 12px;
            border-radius: 40px;
        }
    </style>
</head>
<body>
<div class="rainbow-bg" id="rainbowBg"></div>
<div class="overlay-glow"></div>

<div class="game-container">
    <div class="game-console">
        <div class="game-layout">
            <div class="canvas-area">
                <canvas id="snakeCanvas" width="600" height="600"></canvas>
                <div class="touch-panel">
                    <div class="arrow-row">
                        <button class="ctrl-btn" data-dir="UP">↑</button>
                    </div>
                    <div class="arrow-row">
                        <button class="ctrl-btn" data-dir="LEFT">←</button>
                        <button class="ctrl-btn" data-dir="DOWN">↓</button>
                        <button class="ctrl-btn" data-dir="RIGHT">→</button>
                    </div>
                </div>
            </div>

            <div class="sidebar">
                <div class="score-console">
                    <div class="score-label">🍎 СЧЁТ</div>
                    <div class="score-value" id="scoreValue">0</div>
                </div>
                <div class="button-group">
                    <button class="settings-btn" id="openSettingsBtn">⚙️</button>
                    <button class="leaderboard-btn" id="openLeaderboardBtn">🏆</button>
                    <a class="external-btn" id="externalLink1" href="#" target="_blank"></a>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="gameOverModal" class="modal">
    <div class="modal-content">
        <div class="modal-close-row">
            <span class="modal-close" id="closeGameOverModal">✖</span>
        </div>
        <h2 id="modalTitle">💀GAME OVER💀</h2>
        <div class="modal-stats">
            <p>🐍 Счёт: <span id="finalScore">0</span></p>
            <p>⏱️ Время: <span id="gameTime">0</span> сек.</p>
        </div>
        <button class="modal-btn" id="restartFromDeathBtn">⟳ НОВАЯ ИГРА</button>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <div class="modal-close-row">
            <span class="modal-close" id="closeSettingsModal">✖</span>
        </div>
        <h2>НАСТРОЙКИ</h2>
        <div class="setting-row">
            <label>📐 РАЗМЕР СЕТКИ </label>
            <input type="range" id="gridSizeSlider" min="10" max="35" step="1" value="20">
            <span id="gridSizeValue" class="value-display">20</span>
        </div>
        <div class="setting-row">
            <label>⚡ СКОРОСТЬ (ms) </label>
            <input type="range" id="speedSlider" min="70" max="220" step="5" value="180">
            <span id="speedValue" class="value-display">110</span>
        </div>
        <button class="modal-btn" id="applySettingsBtn">✔ ПРИМЕНИТЬ </button>
        <button class="modal-btn" id="resetSettingsBtn" style="background:#5f4a2e;">⟳ СБРОС </button>
    </div>
</div>
    
<div id="nameModal" class="modal">
    <div class="modal-content" style="max-width: 300px;">
        <div class="modal-close-row"><span class="modal-close" id="closeNameModal">✖</span></div>
        <h2>🏆 НОВЫЙ РЕКОРД!</h2>
        <p>Ваш счёт: <strong id="newScoreSpan">0</strong></p>
        <p>Введите имя для таблицы лидеров:</p>
        <input type="text" id="playerName" maxlength="20" placeholder="Ваше имя" style="width: 100%; padding: 8px; border-radius: 40px; border: none; text-align: center;">
        <button id="submitScoreBtn" class="modal-btn" style="margin-top: 20px;">ОТПРАВИТЬ</button>
    </div>
</div>
    
<div id="leaderboardModal" class="modal">
    <div class="modal-content">
        <div class="modal-close-row"><span class="modal-close" id="closeLeaderboardModal">✖</span></div>
        <h2>🏆 ТАБЛИЦА ЛИДЕРОВ</h2>
        <div id="leaderboardList" style="max-height: 300px; overflow-y: auto; text-align: left; margin: 15px 0;"></div>
        <button id="refreshLeaderboardBtn" class="modal-btn">ОБНОВИТЬ</button>
    </div>
</div>
    
<script>
    (function(){
        // ⚠️ ЗАМЕНИТЕ НА ВАШ РЕАЛЬНЫЙ URL ВЕБ-ПРИЛОЖЕНИЯ
        const LEADERBOARD_API_URL = 'https://script.google.com/macros/s/AKfycbx8ZN619xV7ki6zN_kcwgazpQR_WSZd3itfX9eCaNyAqfOKz70W4ij3YrIvdl4cWwGanA/exec'; 
        let pendingScore = null; 
        
        async function isHighScore(score) {
            try {
                const response = await fetch(LEADERBOARD_API_URL);
                const records = await response.json();
                if (records.length < 20) return true;
                const worst = records[records.length-1]?.score || 0;
                return score > worst;
            } catch(e) { return false; }
        }
        
        async function submitScore(name, score, duration) {
            try {
                const response = await fetch(LEADERBOARD_API_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name, score: score, duration: duration })
                });
                const result = await response.json();
                return result.success;
            } catch(e) {
                console.error('Ошибка отправки:', e);
                return false;
            }
        }
        
        async function loadAndShowLeaderboard() {
            try {
                const response = await fetch(LEADERBOARD_API_URL);
                const records = await response.json();
                const container = document.getElementById('leaderboardList');
                if (!container) return;
                if (records.length === 0) {
                    container.innerHTML = '<p>Пока нет рекордов :(</p>';
                } else {
                    let html = '<ol style="margin: 0; padding-left: 20px;">';
                    records.forEach(rec => {
                        const durationText = rec.duration ? `${rec.duration} сек.` : '—';
                        html += `<li><strong>${escapeHtml(rec.name)}</strong> — ${rec.score} очков <span style="font-size: 12px;">(${durationText})</span></li>`;
                    });
                    html += '</ol>';
                    container.innerHTML = html;
                }
            } catch(e) {
                console.error(e);
                const container = document.getElementById('leaderboardList');
                if (container) container.innerHTML = '<p>Не удалось загрузить рекорды</p>';
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function checkAndPromptHighScore(currentScore, currentDuration) {
            if (currentScore > 0) {
                isHighScore(currentScore).then(isHigh => {
                    if (isHigh) {
                        pendingScore = currentScore;
                        document.getElementById('newScoreSpan').innerText = currentScore;
                        document.getElementById('nameModal').classList.add('active');
                        // сохраним duration для отправки
                        window._pendingDuration = currentDuration;
                    }
                });
            }
        }
        
        document.getElementById('submitScoreBtn').onclick = async () => {
            const name = document.getElementById('playerName').value.trim();
            if (name === "") {
                alert("Введите имя");
                return;
            }
            const duration = window._pendingDuration || 0;
            const success = await submitScore(name, pendingScore, duration);
            if (success) {
                document.getElementById('nameModal').classList.remove('active');
                alert("Рекорд сохранён!");
            } else {
                alert("Ошибка сохранения. Попробуйте позже.");
            }
            pendingScore = null;
            window._pendingDuration = null;
            document.getElementById('playerName').value = "";
        };
        document.getElementById('closeNameModal').onclick = () => {
            document.getElementById('nameModal').classList.remove('active');
            pendingScore = null;
            window._pendingDuration = null;
        };
        document.getElementById('openLeaderboardBtn').onclick = () => {
            loadAndShowLeaderboard();
            document.getElementById('leaderboardModal').classList.add('active');
        };
        document.getElementById('closeLeaderboardModal').onclick = () => {
            document.getElementById('leaderboardModal').classList.remove('active');
        };
        document.getElementById('refreshLeaderboardBtn').onclick = () => {
            loadAndShowLeaderboard();
        };
        
        // ----- ОСНОВНОЙ КОД ИГРЫ -----
        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreValue');
        const gameOverModal = document.getElementById('gameOverModal');
        const settingsModal = document.getElementById('settingsModal');
        const finalScoreSpan = document.getElementById('finalScore');
        const gameTimeSpan = document.getElementById('gameTime');
        const modalTitle = document.getElementById('modalTitle');
        const gridSizeSlider = document.getElementById('gridSizeSlider');
        const gridSizeValueSpan = document.getElementById('gridSizeValue');
        const speedSlider = document.getElementById('speedSlider');
        const speedValueSpan = document.getElementById('speedValue');
        const rainbowBg = document.getElementById('rainbowBg');
        
        let hue = 0;
        function updateRainbowBackground() {
            const color1 = `hsl(${hue}, 100%, 55%)`;
            const color2 = `hsl(${(hue + 60) % 360}, 100%, 55%)`;
            const color3 = `hsl(${(hue + 120) % 360}, 100%, 55%)`;
            const color4 = `hsl(${(hue + 180) % 360}, 100%, 55%)`;
            rainbowBg.style.background = `linear-gradient(125deg, ${color1}, ${color2}, ${color3}, ${color4})`;
            rainbowBg.style.backgroundSize = '400% 400%';
            hue = (hue + 0.25) % 360;
            requestAnimationFrame(() => { setTimeout(updateRainbowBackground, 60); });
        }
        updateRainbowBackground();
        
        const DEFAULT_GRID = 20;
        const DEFAULT_SPEED = 110;
        
        let GRID_SIZE = DEFAULT_GRID;
        let CELL_SIZE = canvas.width / GRID_SIZE;
        let gameSpeed = DEFAULT_SPEED;
        
        let snake = [];
        let food = { x: 12, y: 12 };
        let direction = 'UP';
        let nextDirection = 'UP';
        let score = 0;
        let gameRunning = true;
        let gameLoopId = null;
        let lastMoveTime = 0;
        let sessionStartTime = null;
        let isPaused = false;
        
        let appleImage = new Image();
        let appleLoaded = false;
        const APPLE_URL = 'https://raw.githubusercontent.com/By-Atoo/fe82ge8282/main/.res/apple.png';
        appleImage.onload = () => { appleLoaded = true; drawGame(); };
        appleImage.onerror = () => { appleLoaded = false; drawGame(); };
        appleImage.src = APPLE_URL;
        
        function updateCellSize() {
            CELL_SIZE = canvas.width / GRID_SIZE;
        }
        
        function isPartOfSnake(x, y) {
            return snake.some(seg => seg.x === x && seg.y === y);
        }
        
        function generateValidFood() {
            const maxAttempts = 5000;
            for(let i = 0; i < maxAttempts; i++) {
                const randX = Math.floor(Math.random() * GRID_SIZE);
                const randY = Math.floor(Math.random() * GRID_SIZE);
                if(!isPartOfSnake(randX, randY)) {
                    food = { x: randX, y: randY };
                    return;
                }
            }
            for(let y = 0; y < GRID_SIZE; y++) {
                for(let x = 0; x < GRID_SIZE; x++) {
                    if(!isPartOfSnake(x, y)) {
                        food = { x, y };
                        return;
                    }
                }
            }
            gameWin();
        }
        
        function updateScoreUI() {
            scoreSpan.innerText = score;
        }
        
        function startSessionTimer() {
            sessionStartTime = Date.now();
        }
        
        function getSessionDuration() {
            if(!sessionStartTime) return 0;
            return Math.floor((Date.now() - sessionStartTime) / 1000);
        }
        
        function initGame(resetTimer = true) {
            const startX = Math.floor(GRID_SIZE / 2);
            const headY = GRID_SIZE - 2;
            snake = [
                { x: startX, y: headY },
                { x: startX, y: headY + 1 },
                { x: startX, y: headY + 2 }
            ];
            direction = 'UP';
            nextDirection = 'UP';
            score = 0;
            gameRunning = true;
            isPaused = false;
            updateScoreUI();
            generateValidFood();
            drawGame();
            if(resetTimer) startSessionTimer();
        }
        
        function moveSnake() {
            if(!gameRunning || isPaused) return false;
            
            let newDir = nextDirection;
            if((newDir === 'RIGHT' && direction === 'LEFT') ||
               (newDir === 'LEFT' && direction === 'RIGHT') ||
               (newDir === 'UP' && direction === 'DOWN') ||
               (newDir === 'DOWN' && direction === 'UP')) {
                newDir = direction;
            }
            direction = newDir;
            
            let newHead = { ...snake[0] };
            switch(direction) {
                case 'RIGHT': newHead.x += 1; break;
                case 'LEFT':  newHead.x -= 1; break;
                case 'UP':    newHead.y -= 1; break;
                case 'DOWN':  newHead.y += 1; break;
            }
            
            const willEat = (newHead.x === food.x && newHead.y === food.y);
            snake.unshift(newHead);
            if(!willEat) {
                snake.pop();
            } else {
                score++;
                updateScoreUI();
                generateValidFood();
            }
            
            const head = snake[0];
            if(head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                gameOver();
                return false;
            }
            for(let i = 1; i < snake.length; i++) {
                if(snake[i].x === head.x && snake[i].y === head.y) {
                    gameOver();
                    return false;
                }
            }
            return true;
        }
        
        function gameOver() {
            if(!gameRunning) return;
            gameRunning = false;
            isPaused = false;
            if(gameLoopId) {
                cancelAnimationFrame(gameLoopId);
                gameLoopId = null;
            }
            const duration = getSessionDuration();
            finalScoreSpan.innerText = score;
            gameTimeSpan.innerText = duration;
            modalTitle.innerHTML = '💀GAME OVER💀';
            gameOverModal.classList.add('active');
            drawGame();
            checkAndPromptHighScore(score, duration);
        }
        
        function gameWin() {
            if(!gameRunning) return;
            gameRunning = false;
            isPaused = false;
            if(gameLoopId) {
                cancelAnimationFrame(gameLoopId);
                gameLoopId = null;
            }
            const duration = getSessionDuration();
            finalScoreSpan.innerText = score;
            gameTimeSpan.innerText = duration;
            modalTitle.innerHTML = '🏆YOU WIN🏆';
            gameOverModal.classList.add('active');
            drawGame();
            checkAndPromptHighScore(score, duration);
        }
        
        function drawGame() {
            if(!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0a1a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#5eff5e';
            ctx.lineWidth = 1.5;
            for(let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }
            
            const fx = food.x * CELL_SIZE;
            const fy = food.y * CELL_SIZE;
            const size = CELL_SIZE;
            if(appleLoaded && appleImage.complete && appleImage.naturalWidth > 0) {
                const pad = Math.max(2, CELL_SIZE * 0.1);
                ctx.drawImage(appleImage, fx + pad, fy + pad, size - pad*2, size - pad*2);
            } else {
                ctx.fillStyle = '#ff5e5e';
                ctx.beginPath();
                ctx.arc(fx + size/2, fy + size/2, size/2 - 3, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#ffffaa';
                ctx.beginPath();
                ctx.arc(fx + size/2 - 3, fy + size/2 - 4, 3.5, 0, Math.PI*2);
                ctx.fill();
            }
            
            for(let i = 0; i < snake.length; i++) {
                const seg = snake[i];
                const x = seg.x * CELL_SIZE;
                const y = seg.y * CELL_SIZE;
                const radius = Math.max(3, CELL_SIZE * 0.22);
                ctx.fillStyle = i === 0 ? '#b3ff8f' : '#5fdd4a';
                ctx.shadowBlur = 6;
                ctx.shadowColor = '#aaffaa';
                ctx.beginPath();
                ctx.roundRect(x + 2, y + 2, CELL_SIZE - 4, CELL_SIZE - 4, radius);
                ctx.fill();
                ctx.strokeStyle = '#007700';
                ctx.lineWidth = 1.8;
                ctx.beginPath();
                ctx.roundRect(x + 2, y + 2, CELL_SIZE - 4, CELL_SIZE - 4, radius);
                ctx.stroke();
                
                if(i === 0) {
                    const eyeSize = Math.max(3, CELL_SIZE * 0.18);
                    const pupilSize = Math.max(1.5, eyeSize * 0.6);
                    const eyeOffsetX = CELL_SIZE * 0.28;
                    const eyeOffsetY = CELL_SIZE * 0.32;
                    const leftEyeX = x + eyeOffsetX;
                    const rightEyeX = x + CELL_SIZE - eyeOffsetX;
                    const eyeY = y + eyeOffsetY;
                    
                    let pupilShiftX = 0, pupilShiftY = 0;
                    const shiftAmount = eyeSize * 0.3;
                    switch(direction) {
                        case 'RIGHT': pupilShiftX = shiftAmount; break;
                        case 'LEFT':  pupilShiftX = -shiftAmount; break;
                        case 'UP':    pupilShiftY = -shiftAmount; break;
                        case 'DOWN':  pupilShiftY = shiftAmount; break;
                    }
                    
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(leftEyeX, eyeY, eyeSize, 0, Math.PI*2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(rightEyeX, eyeY, eyeSize, 0, Math.PI*2);
                    ctx.fill();
                    
                    ctx.fillStyle = '#000000';
                    ctx.beginPath();
                    ctx.arc(leftEyeX + pupilShiftX, eyeY + pupilShiftY, pupilSize, 0, Math.PI*2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(rightEyeX + pupilShiftX, eyeY + pupilShiftY, pupilSize, 0, Math.PI*2);
                    ctx.fill();
                    
                    ctx.fillStyle = '#ffffff';
                    const highlightSize = pupilSize * 0.4;
                    ctx.beginPath();
                    ctx.arc(leftEyeX + pupilShiftX - highlightSize*0.7, eyeY + pupilShiftY - highlightSize*0.7, highlightSize, 0, Math.PI*2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(rightEyeX + pupilShiftX - highlightSize*0.7, eyeY + pupilShiftY - highlightSize*0.7, highlightSize, 0, Math.PI*2);
                    ctx.fill();
                }
            }
            ctx.shadowBlur = 0;
        }
        
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x+r, y);
                this.lineTo(x+w-r, y);
                this.quadraticCurveTo(x+w, y, x+w, y+r);
                this.lineTo(x+w, y+h-r);
                this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
                this.lineTo(x+r, y+h);
                this.quadraticCurveTo(x, y+h, x, y+h-r);
                this.lineTo(x, y+r);
                this.quadraticCurveTo(x, y, x+r, y);
                return this;
            };
        }
        
        function gameTick(now) {
            if(!gameRunning || isPaused) {
                drawGame();
                if(gameLoopId && (isPaused || !gameRunning)) {
                    gameLoopId = requestAnimationFrame(gameTick);
                }
                return;
            }
            if(!lastMoveTime) {
                lastMoveTime = now;
                requestAnimationFrame(gameTick);
                drawGame();
                return;
            }
            const elapsed = now - lastMoveTime;
            if(elapsed >= gameSpeed) {
                const success = moveSnake();
                lastMoveTime = now;
                drawGame();
                if(!success) {
                    if(gameLoopId) cancelAnimationFrame(gameLoopId);
                    gameLoopId = null;
                    drawGame();
                    return;
                }
            }
            drawGame();
            gameLoopId = requestAnimationFrame(gameTick);
        }
        
        function startGameLoop() {
            if(gameLoopId) cancelAnimationFrame(gameLoopId);
            lastMoveTime = 0;
            gameRunning = true;
            isPaused = false;
            gameLoopId = requestAnimationFrame(gameTick);
        }
        
        function pauseGame() {
            if(gameRunning && !isPaused && gameLoopId) {
                isPaused = true;
            }
        }
        
        function resumeGame() {
            if(gameRunning && isPaused) {
                isPaused = false;
                lastMoveTime = 0;
            }
        }
        
        function setDirection(newDir) {
            if(!gameRunning || isPaused) return;
            if((newDir === 'RIGHT' && direction !== 'LEFT') ||
               (newDir === 'LEFT' && direction !== 'RIGHT') ||
               (newDir === 'UP' && direction !== 'DOWN') ||
               (newDir === 'DOWN' && direction !== 'UP')) {
                nextDirection = newDir;
            }
        }
        
        let touchStart = null;
        function handleTouchStart(e) {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            touchStart = { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
        }
        function handleTouchMove(e) {
            e.preventDefault();
            if(!touchStart || !gameRunning || isPaused) return;
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const dx = (touch.clientX - rect.left) - touchStart.x;
            const dy = (touch.clientY - rect.top) - touchStart.y;
            if(Math.abs(dx) < 12 && Math.abs(dy) < 12) return;
            let newDir = null;
            if(Math.abs(dx) > Math.abs(dy)) newDir = dx > 0 ? 'RIGHT' : 'LEFT';
            else newDir = dy > 0 ? 'DOWN' : 'UP';
            if(newDir) setDirection(newDir);
            touchStart = null;
        }
        function handleTouchEnd(e) { e.preventDefault(); touchStart = null; }
        
        function fullRestart() {
            if(gameLoopId) cancelAnimationFrame(gameLoopId);
            initGame(true);
            gameRunning = true;
            isPaused = false;
            lastMoveTime = 0;
            startGameLoop();
            gameOverModal.classList.remove('active');
            settingsModal.classList.remove('active');
            document.getElementById('nameModal').classList.remove('active');
        }
        
        function resetToDefaultSettings() {
            GRID_SIZE = DEFAULT_GRID;
            gameSpeed = DEFAULT_SPEED;
            updateCellSize();
            gridSizeSlider.value = GRID_SIZE;
            gridSizeValueSpan.innerText = GRID_SIZE;
            const sliderVal = 70 + 220 - gameSpeed;
            speedSlider.value = sliderVal;
            speedValueSpan.innerText = gameSpeed;
            if(gameLoopId) cancelAnimationFrame(gameLoopId);
            initGame(true);
            gameRunning = true;
            isPaused = false;
            lastMoveTime = 0;
            startGameLoop();
            settingsModal.classList.remove('active');
        }
        
        function applySettingsAndRestart() {
            let newGrid = parseInt(gridSizeSlider.value, 10);
            let sliderValue = parseInt(speedSlider.value, 10);
            if(isNaN(newGrid)) newGrid = GRID_SIZE;
            newGrid = Math.min(35, Math.max(10, newGrid));
            let newSpeed = 70 + 220 - sliderValue;
            newSpeed = Math.min(220, Math.max(70, newSpeed));
            GRID_SIZE = newGrid;
            gameSpeed = newSpeed;
            gridSizeValueSpan.innerText = GRID_SIZE;
            speedValueSpan.innerText = gameSpeed;
            updateCellSize();
            if(gameLoopId) cancelAnimationFrame(gameLoopId);
            initGame(true);
            gameRunning = true;
            isPaused = false;
            lastMoveTime = 0;
            startGameLoop();
            settingsModal.classList.remove('active');
        }
        
        function handleKeydown(e) {
            const key = e.key;
            if(gameRunning && !isPaused) {
                let mapped = null;
                if(key === 'ArrowUp') mapped = 'UP';
                else if(key === 'ArrowDown') mapped = 'DOWN';
                else if(key === 'ArrowLeft') mapped = 'LEFT';
                else if(key === 'ArrowRight') mapped = 'RIGHT';
                else if(key === 'ц' || key === 'Ц') mapped = 'UP';
                else if(key === 'ы' || key === 'Ы') mapped = 'DOWN';
                else if(key === 'ф' || key === 'Ф') mapped = 'LEFT';
                else if(key === 'в' || key === 'В') mapped = 'RIGHT';
                else if(key === 'w' || key === 'W') mapped = 'UP';
                else if(key === 's' || key === 'S') mapped = 'DOWN';
                else if(key === 'a' || key === 'A') mapped = 'LEFT';
                else if(key === 'd' || key === 'D') mapped = 'RIGHT';
                if(mapped) {
                    e.preventDefault();
                    setDirection(mapped);
                    return;
                }
            }
            
            if(key === 'Escape') {
                e.preventDefault();
                if(settingsModal.classList.contains('active')) {
                    settingsModal.classList.remove('active');
                    if(gameRunning && isPaused) resumeGame();
                } else {
                    if(gameRunning && !isPaused) pauseGame();
                    gridSizeSlider.value = GRID_SIZE;
                    gridSizeValueSpan.innerText = GRID_SIZE;
                    const sliderVal = 70 + 220 - gameSpeed;
                    speedSlider.value = sliderVal;
                    speedValueSpan.innerText = gameSpeed;
                    settingsModal.classList.add('active');
                }
                return;
            }
            
            if(key === 'Enter' || key === ' ' || key === 'Space') {
                e.preventDefault();
                if(gameOverModal.classList.contains('active') || settingsModal.classList.contains('active')) {
                    fullRestart();
                }
                return;
            }
        }
        
        function attachEvents() {
            canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
            canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
            canvas.addEventListener('touchend', handleTouchEnd);
            window.addEventListener('keydown', handleKeydown);
            
            document.querySelectorAll('.ctrl-btn').forEach(btn => {
                const dir = btn.getAttribute('data-dir');
                if(!dir) return;
                btn.addEventListener('click', (e) => { e.preventDefault(); setDirection(dir); });
                btn.addEventListener('touchstart', (e) => { e.preventDefault(); setDirection(dir); });
            });
            
            document.getElementById('closeGameOverModal').onclick = () => {
                gameOverModal.classList.remove('active');
            };
            document.getElementById('closeSettingsModal').onclick = () => {
                settingsModal.classList.remove('active');
                if(gameRunning && isPaused) resumeGame();
            };
            document.getElementById('restartFromDeathBtn').onclick = () => fullRestart();
            document.getElementById('openSettingsBtn').onclick = () => {
                if(gameRunning && !isPaused) pauseGame();
                gridSizeSlider.value = GRID_SIZE;
                gridSizeValueSpan.innerText = GRID_SIZE;
                const sliderVal = 70 + 220 - gameSpeed;
                speedSlider.value = sliderVal;
                speedValueSpan.innerText = gameSpeed;
                settingsModal.classList.add('active');
            };
            document.getElementById('applySettingsBtn').onclick = () => applySettingsAndRestart();
            document.getElementById('resetSettingsBtn').onclick = () => resetToDefaultSettings();
            
            gridSizeSlider.oninput = () => {
                gridSizeValueSpan.innerText = gridSizeSlider.value;
            };
            speedSlider.oninput = () => {
                const val = parseInt(speedSlider.value, 10);
                const speedMs = 70 + 220 - val;
                speedValueSpan.innerText = speedMs;
            };
            
            const externalLinks = document.querySelectorAll('.external-btn');
            const placeholderUrl = 'ССЫЛКА-ПОД-ЗАМЕНУ1';
            externalLinks.forEach(link => {
                link.href = placeholderUrl;
            });
        }
        
        function start() {
            updateCellSize();
            initGame(true);
            startGameLoop();
            attachEvents();
        }
        
        start();
    })();
</script>
</body>
</html>
