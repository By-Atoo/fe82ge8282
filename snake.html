<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title> Змейка 🐍</title>
    <link rel="icon" href="https://raw.githubusercontent.com/By-Atoo/fe82ge8282/main/.res/apple.png" type="image/png">
    <style>
        * {
            user-select: none;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', monospace;
            padding: 16px;
            overflow-x: hidden;
        }
        .rainbow-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            transition: background 1.5s ease;
        }
        .overlay-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.2) 100%);
            pointer-events: none; z-index: -1;
        }
        .game-container {
            width: 100%; max-width: 1200px; padding: 0;
            display: flex; justify-content: center; align-items: center;
        }
        .game-console {
            background: rgba(10, 15, 8, 0.7); backdrop-filter: blur(8px);
            border-radius: 48px; padding: 16px 18px 18px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.6), inset 0 1px 2px rgba(255,255,200,0.2);
            width: auto;
        }
        .game-layout { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .canvas-area { min-width: 260px; display: flex; flex-direction: column; align-items: center; }
        canvas {
            display: block; width: 100%; height: auto; background: #0a1f0a;
            border-radius: 28px; box-shadow: 0 0 0 4px #ffe6b3, 0 12px 25px black;
            cursor: pointer; aspect-ratio: 1 / 1;
        }
        @media (max-width: 900px) { canvas { max-width: 85vw; max-height: 85vw; width: auto; } }
        @media (min-width: 901px) { canvas { max-width: 550px; max-height: 550px; width: 550px; height: 550px; } }
        .touch-panel { margin-top: 18px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .arrow-row { display: flex; justify-content: center; gap: 18px; }
        .ctrl-btn {
            background: #1e2a1aee; backdrop-filter: blur(6px); border: none;
            font-size: 38px; font-weight: bold; padding: 6px 22px; border-radius: 60px;
            box-shadow: 0 6px 0 #0e3b0e; transition: 0.05s linear; cursor: pointer;
            color: #ffffcc; min-width: 80px; font-family: monospace;
        }
        .ctrl-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #0e3b0e; }
        @media (min-width: 901px) { .touch-panel { display: none; } }
        .sidebar {
            flex: 1; min-width: 130px; background: rgba(0,0,0,0.55); backdrop-filter: blur(12px);
            border-radius: 48px; padding: 18px 10px; display: flex; flex-direction: column;
            align-items: center; gap: 20px; border: 1px solid #ffda88;
        }
        .score-console {
            text-align: center; background: #000000aa; width: 100%; border-radius: 36px;
            padding: 8px 5px; border-bottom: 2px solid #ffcc55;
        }
        .score-label { font-size: 14px; color: #ffe6b3; letter-spacing: 1px; font-weight: 500; }
        .score-value { font-size: 36px; font-weight: bold; color: #ffffcc; text-shadow: 0 0 6px #ffaa44; font-family: monospace; line-height: 1; }
        .button-group { display: flex; flex-direction: column; gap: 12px; width: 100%; align-items: center; }
        .settings-btn, .leaderboard-btn {
            background: #ffb347dd; border: none; font-size: 28px; cursor: pointer; padding: 8px;
            border-radius: 60px; width: 70px; transition: 0.08s linear; box-shadow: 0 5px 0 #9b551a;
            color: #2c1c0a; text-align: center;
        }
        .leaderboard-btn { background: #4a6a4add; box-shadow: 0 5px 0 #2e4a2e; }
        .settings-btn:active, .leaderboard-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #9b551a; }
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.88); backdrop-filter: blur(10px);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; visibility: hidden; opacity: 0;
            transition: visibility 0.2s, opacity 0.2s;
        }
        .modal.active { visibility: visible; opacity: 1; }
        .modal-content {
            background: #0f1a0f; border-radius: 56px; padding: 20px 24px 28px;
            max-width: 340px; width: 85%; text-align: center;
            border: 2px solid #ffdd77; box-shadow: 0 0 35px #ffbb44; color: #ffffdd;
            position: relative;
        }
        .modal-close-row { text-align: right; margin-bottom: 6px; }
        .modal-close { font-size: 28px; cursor: pointer; color: #ffdd99; display: inline-block; padding: 0 6px; }
        .modal-close:hover { color: #ffaa55; transform: scale(1.1); }
        .modal-content h2 { font-size: 30px; margin: 0 0 16px; text-transform: uppercase; letter-spacing: 2px; }
        .modal-stats { font-size: 22px; margin: 18px 0; background: #00000099; padding: 12px; border-radius: 40px; }
        .modal-stats p { margin: 8px 0; }
        .modal-btn {
            background: #ffb347; border: none; font-size: 22px; font-weight: bold;
            padding: 10px 16px; border-radius: 60px; font-family: monospace;
            cursor: pointer; margin-top: 14px; width: 100%;
            box-shadow: 0 5px 0 #9b551a; transition: 0.05s linear;
        }
        .modal-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #9b551a; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin: 18px 0; gap: 12px; }
        .setting-row label { font-size: 16px; font-weight: bold; }
        input[type="range"] { flex: 2; min-width: 130px; }
        .value-display { background: black; padding: 3px 10px; border-radius: 30px; font-weight: bold; font-size: 14px; }
        #leaderboardList { max-height: 300px; overflow-y: auto; text-align: left; margin: 15px 0; }
        .server-status { font-size: 12px; margin-top: 5px; opacity: 0.8; }
    </style>
</head>
<body>
<div class="rainbow-bg" id="rainbowBg"></div>
<div class="overlay-glow"></div>

<div class="game-container">
    <div class="game-console">
        <div class="game-layout">
            <div class="canvas-area">
                <canvas id="snakeCanvas" width="600" height="600"></canvas>
                <div class="touch-panel">
                    <div class="arrow-row"><button class="ctrl-btn" data-dir="UP">↑</button></div>
                    <div class="arrow-row">
                        <button class="ctrl-btn" data-dir="LEFT">←</button>
                        <button class="ctrl-btn" data-dir="DOWN">↓</button>
                        <button class="ctrl-btn" data-dir="RIGHT">→</button>
                    </div>
                </div>
            </div>
            <div class="sidebar">
                <div class="score-console">
                    <div class="score-label">🍎 СЧЁТ</div>
                    <div class="score-value" id="scoreValue">0</div>
                </div>
                <div class="button-group">
                    <button class="settings-btn" id="openSettingsBtn">⚙️</button>
                    <button class="leaderboard-btn" id="openLeaderboardBtn">🏆</button>
                </div>
                <div id="serverStatus" class="server-status"></div>
            </div>
        </div>
    </div>
</div>

<div id="gameOverModal" class="modal">
    <div class="modal-content">
        <div class="modal-close-row"><span class="modal-close" id="closeGameOverModal">✖</span></div>
        <h2 id="modalTitle">💀GAME OVER💀</h2>
        <div class="modal-stats">
            <p>🐍 Счёт: <span id="finalScore">0</span></p>
            <p>⏱️ Время: <span id="gameTime">0</span> сек.</p>
        </div>
        <button class="modal-btn" id="restartFromDeathBtn">⟳ НОВАЯ ИГРА</button>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <div class="modal-close-row"><span class="modal-close" id="closeSettingsModal">✖</span></div>
        <h2>НАСТРОЙКИ</h2>
        <div class="setting-row">
            <label>📐 РАЗМЕР СЕТКИ</label>
            <input type="range" id="gridSizeSlider" min="10" max="35" step="1" value="20">
            <span id="gridSizeValue" class="value-display">20</span>
        </div>
        <div class="setting-row">
            <label>⚡ СКОРОСТЬ (ms)</label>
            <input type="range" id="speedSlider" min="70" max="220" step="5" value="180">
            <span id="speedValue" class="value-display">110</span>
        </div>
        <button class="modal-btn" id="applySettingsBtn">✔ ПРИМЕНИТЬ</button>
        <button class="modal-btn" id="resetSettingsBtn" style="background:#5f4a2e;">⟳ СБРОС</button>
    </div>
</div>

<div id="nameModal" class="modal">
    <div class="modal-content" style="max-width:300px;">
        <div class="modal-close-row"><span class="modal-close" id="closeNameModal">✖</span></div>
        <h2>👤 ВАШ НИК</h2>
        <p>Введите имя для таблицы рекордов</p>
        <input type="text" id="playerNameInput" maxlength="20" placeholder="Игрок" style="width:100%;padding:8px;border-radius:40px;border:none;text-align:center;">
        <button id="saveNameBtn" class="modal-btn" style="margin-top:20px;">СОХРАНИТЬ</button>
    </div>
</div>

<div id="leaderboardModal" class="modal">
    <div class="modal-content">
        <div class="modal-close-row"><span class="modal-close" id="closeLeaderboardModal">✖</span></div>
        <h2>🏆 ТАБЛИЦА ЛИДЕРОВ</h2>
        <div id="leaderboardList">Загрузка...</div>
        <button id="refreshLeaderboardBtn" class="modal-btn">ОБНОВИТЬ</button>
    </div>
</div>

<script>
    (function(){
        // ======================= НАСТРОЙКИ СЕРВЕРА =======================
        const BOT_API_URL = 'https://atooawahost.loca.lt';   // HTTPS туннель
        const API_SECRET = 'G3o2aY2uMuJ02dirkzD71MsiTa0i2BmPSI0rk7';
        console.log('API URL:', BOT_API_URL);
        // =================================================================

        const STORAGE_KEY = 'snake_player';
        let playerName = localStorage.getItem('snake_nick') || '';
        let localBestScore = 0;

        function loadLocalBest() {
            if (!playerName) return 0;
            const data = localStorage.getItem(`snake_best_${playerName}`);
            return data ? parseInt(data, 10) : 0;
        }

        function saveLocalBest(score) {
            if (!playerName) return;
            if (score > localBestScore) {
                localBestScore = score;
                localStorage.setItem(`snake_best_${playerName}`, score);
            }
        }

        async function checkServerStatus() {
            const statusEl = document.getElementById('serverStatus');
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 2000);
                const response = await fetch(`${BOT_API_URL}/leaderboard`, { signal: controller.signal });
                clearTimeout(timeoutId);
                if (response.ok) {
                    statusEl.innerHTML = '🟢 Сервер онлайн';
                    statusEl.style.color = '#8bc34a';
                    return true;
                }
            } catch (e) {}
            statusEl.innerHTML = '🔴 Сервер офлайн';
            statusEl.style.color = '#ff8a80';
            return false;
        }

        async function syncRecordToServer(name, score, duration) {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 3000);
                const response = await fetch(`${BOT_API_URL}/record`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, score, duration, secret: API_SECRET }),
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                return response.ok;
            } catch {
                return false;
            }
        }

        async function fetchGlobalLeaderboard() {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 3000);
                const response = await fetch(`${BOT_API_URL}/leaderboard`, { signal: controller.signal });
                clearTimeout(timeoutId);
                if (!response.ok) throw new Error();
                return await response.json();
            } catch {
                return null;
            }
        }

        async function showLeaderboard() {
            const container = document.getElementById('leaderboardList');
            container.innerHTML = '⏳ Загрузка...';
            const globalRecords = await fetchGlobalLeaderboard();
            if (globalRecords) {
                if (globalRecords.length === 0) {
                    container.innerHTML = '<p>😕 Пока нет рекордов</p>';
                    return;
                }
                let html = '<ol style="margin:0; padding-left:20px;">';
                globalRecords.forEach(r => {
                    html += `<li><strong>${escapeHtml(r.name)}</strong> — ${r.score} 🍎 (${r.duration}с)</li>`;
                });
                html += '</ol>';
                container.innerHTML = html;
            } else {
                if (playerName && localBestScore > 0) {
                    container.innerHTML = `<p style="color:#ffaa00;">⚠️ Сервер недоступен</p>
                        <p>Ваш лучший результат:</p>
                        <p><strong>${escapeHtml(playerName)}</strong> — ${localBestScore} 🍎</p>`;
                } else {
                    container.innerHTML = `<p style="color:#ffaa00;">⚠️ Сервер недоступен</p><p>Нет локальных рекордов</p>`;
                }
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);
        }

        function initPlayer() {
            if (playerName) {
                localBestScore = loadLocalBest();
                return;
            }
            document.getElementById('nameModal').classList.add('active');
        }

        function setPlayerName(name) {
            name = name.trim();
            if (!name) name = 'Игрок';
            playerName = name;
            localStorage.setItem('snake_nick', playerName);
            localBestScore = loadLocalBest();
            document.getElementById('nameModal').classList.remove('active');
        }

        // ------------------- ИГРОВАЯ ЛОГИКА (БЕЗ ИЗМЕНЕНИЙ) -------------------
        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreValue');
        const gameOverModal = document.getElementById('gameOverModal');
        const settingsModal = document.getElementById('settingsModal');
        const finalScoreSpan = document.getElementById('finalScore');
        const gameTimeSpan = document.getElementById('gameTime');
        const modalTitle = document.getElementById('modalTitle');
        const gridSizeSlider = document.getElementById('gridSizeSlider');
        const gridSizeValueSpan = document.getElementById('gridSizeValue');
        const speedSlider = document.getElementById('speedSlider');
        const speedValueSpan = document.getElementById('speedValue');
        const rainbowBg = document.getElementById('rainbowBg');

        let hue = 0;
        function updateRainbow() {
            rainbowBg.style.background = `linear-gradient(125deg, hsl(${hue},100%,55%), hsl(${hue+60},100%,55%), hsl(${hue+120},100%,55%), hsl(${hue+180},100%,55%))`;
            rainbowBg.style.backgroundSize = '400% 400%';
            hue = (hue + 0.25) % 360;
            requestAnimationFrame(() => setTimeout(updateRainbow, 60));
        }
        updateRainbow();

        const DEFAULT_GRID = 20;
        const DEFAULT_SPEED = 110;
        let GRID_SIZE = DEFAULT_GRID;
        let CELL_SIZE = canvas.width / GRID_SIZE;
        let gameSpeed = DEFAULT_SPEED;
        let snake = [], food = { x: 12, y: 12 };
        let direction = 'UP', nextDirection = 'UP';
        let score = 0, gameRunning = true, isPaused = false;
        let gameLoopId = null, lastMoveTime = 0, sessionStartTime = null;

        const appleImage = new Image();
        let appleLoaded = false;
        appleImage.onload = () => { appleLoaded = true; drawGame(); };
        appleImage.onerror = () => { appleLoaded = false; drawGame(); };
        appleImage.src = 'https://raw.githubusercontent.com/By-Atoo/fe82ge8282/main/.res/apple.png';

        function updateCellSize() { CELL_SIZE = canvas.width / GRID_SIZE; }
        const isPartOfSnake = (x, y) => snake.some(s => s.x === x && s.y === y);

        function generateValidFood() {
            const freeCells = [];
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    if (!isPartOfSnake(x, y)) freeCells.push({x, y});
                }
            }
            if (freeCells.length === 0) { gameWin(); return; }
            food = freeCells[Math.floor(Math.random() * freeCells.length)];
        }

        function updateScoreUI() { scoreSpan.innerText = score; }
        function startSessionTimer() { sessionStartTime = Date.now(); }
        function getSessionDuration() { return sessionStartTime ? Math.floor((Date.now() - sessionStartTime) / 1000) : 0; }

        function initGame(resetTimer = true) {
            const mid = Math.floor(GRID_SIZE / 2);
            snake = [{x: mid, y: GRID_SIZE-2}, {x: mid, y: GRID_SIZE-1}, {x: mid, y: GRID_SIZE}];
            direction = nextDirection = 'UP';
            score = 0;
            gameRunning = true;
            isPaused = false;
            updateScoreUI();
            generateValidFood();
            drawGame();
            if (resetTimer) startSessionTimer();
        }

        function moveSnake() {
            if (!gameRunning || isPaused) return false;
            let newDir = nextDirection;
            if ((newDir === 'RIGHT' && direction === 'LEFT') || (newDir === 'LEFT' && direction === 'RIGHT') ||
                (newDir === 'UP' && direction === 'DOWN') || (newDir === 'DOWN' && direction === 'UP')) {
                newDir = direction;
            }
            direction = newDir;
            const head = snake[0];
            let newHead = { ...head };
            switch(direction) {
                case 'RIGHT': newHead.x++; break;
                case 'LEFT':  newHead.x--; break;
                case 'UP':    newHead.y--; break;
                case 'DOWN':  newHead.y++; break;
            }
            const willEat = (newHead.x === food.x && newHead.y === food.y);
            snake.unshift(newHead);
            if (!willEat) snake.pop();
            else { score++; updateScoreUI(); generateValidFood(); }
            const h = snake[0];
            if (h.x < 0 || h.x >= GRID_SIZE || h.y < 0 || h.y >= GRID_SIZE) { gameOver(); return false; }
            if (snake.slice(1).some(s => s.x === h.x && s.y === h.y)) { gameOver(); return false; }
            return true;
        }

        function gameOver() {
            if (!gameRunning) return;
            gameRunning = false; isPaused = false;
            if (gameLoopId) { cancelAnimationFrame(gameLoopId); gameLoopId = null; }
            const duration = getSessionDuration();
            finalScoreSpan.innerText = score;
            gameTimeSpan.innerText = duration;
            modalTitle.innerHTML = '💀GAME OVER💀';
            gameOverModal.classList.add('active');
            drawGame();

            if (playerName) {
                saveLocalBest(score);
                if (score > localBestScore) {
                    syncRecordToServer(playerName, score, duration);
                }
            }
        }

        function gameWin() {
            if (!gameRunning) return;
            gameRunning = false; isPaused = false;
            if (gameLoopId) { cancelAnimationFrame(gameLoopId); gameLoopId = null; }
            const duration = getSessionDuration();
            finalScoreSpan.innerText = score;
            gameTimeSpan.innerText = duration;
            modalTitle.innerHTML = '🏆YOU WIN🏆';
            gameOverModal.classList.add('active');
            drawGame();

            if (playerName) {
                saveLocalBest(score);
                if (score > localBestScore) {
                    syncRecordToServer(playerName, score, duration);
                }
            }
        }

        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0a1a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#5eff5e';
            ctx.lineWidth = 1.5;
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0); ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.moveTo(0, i * CELL_SIZE); ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }
            const fx = food.x * CELL_SIZE, fy = food.y * CELL_SIZE, size = CELL_SIZE;
            if (appleLoaded && appleImage.complete) {
                const pad = Math.max(2, CELL_SIZE * 0.1);
                ctx.drawImage(appleImage, fx + pad, fy + pad, size - pad*2, size - pad*2);
            } else {
                ctx.fillStyle = '#ff5e5e';
                ctx.beginPath();
                ctx.arc(fx + size/2, fy + size/2, size/2 - 3, 0, 2*Math.PI);
                ctx.fill();
            }
            snake.forEach((seg, i) => {
                const x = seg.x * CELL_SIZE, y = seg.y * CELL_SIZE;
                const radius = Math.max(3, CELL_SIZE * 0.22);
                ctx.fillStyle = i === 0 ? '#b3ff8f' : '#5fdd4a';
                ctx.shadowBlur = 6; ctx.shadowColor = '#aaffaa';
                ctx.beginPath();
                ctx.roundRect(x+2, y+2, CELL_SIZE-4, CELL_SIZE-4, radius);
                ctx.fill();
                ctx.strokeStyle = '#007700'; ctx.lineWidth = 1.8;
                ctx.beginPath();
                ctx.roundRect(x+2, y+2, CELL_SIZE-4, CELL_SIZE-4, radius);
                ctx.stroke();
                if (i === 0) {
                    const eyeSize = Math.max(3, CELL_SIZE*0.18);
                    const offX = CELL_SIZE*0.28, offY = CELL_SIZE*0.32;
                    const lx = x + offX, rx = x + CELL_SIZE - offX, ey = y + offY;
                    ctx.fillStyle = '#fff';
                    ctx.beginPath(); ctx.arc(lx, ey, eyeSize, 0, 2*Math.PI); ctx.fill();
                    ctx.beginPath(); ctx.arc(rx, ey, eyeSize, 0, 2*Math.PI); ctx.fill();
                    ctx.fillStyle = '#000';
                    ctx.beginPath(); ctx.arc(lx, ey, eyeSize*0.5, 0, 2*Math.PI); ctx.fill();
                    ctx.beginPath(); ctx.arc(rx, ey, eyeSize*0.5, 0, 2*Math.PI); ctx.fill();
                }
            });
            ctx.shadowBlur = 0;
        }

        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
            if (w < 2*r) r = w/2; if (h < 2*r) r = h/2;
            this.moveTo(x+r, y); this.lineTo(x+w-r, y);
            this.quadraticCurveTo(x+w, y, x+w, y+r);
            this.lineTo(x+w, y+h-r); this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
            this.lineTo(x+r, y+h); this.quadraticCurveTo(x, y+h, x, y+h-r);
            this.lineTo(x, y+r); this.quadraticCurveTo(x, y, x+r, y);
            return this;
        };

        function gameTick(now) {
            if (!gameRunning || isPaused) { drawGame(); gameLoopId = requestAnimationFrame(gameTick); return; }
            if (!lastMoveTime) { lastMoveTime = now; requestAnimationFrame(gameTick); return; }
            if (now - lastMoveTime >= gameSpeed) {
                moveSnake();
                lastMoveTime = now;
                drawGame();
            }
            gameLoopId = requestAnimationFrame(gameTick);
        }

        function startGameLoop() {
            if (gameLoopId) cancelAnimationFrame(gameLoopId);
            lastMoveTime = 0; gameRunning = true; isPaused = false;
            gameLoopId = requestAnimationFrame(gameTick);
        }

        function setDirection(newDir) {
            if (!gameRunning || isPaused) return;
            if ((newDir === 'RIGHT' && direction !== 'LEFT') || (newDir === 'LEFT' && direction !== 'RIGHT') ||
                (newDir === 'UP' && direction !== 'DOWN') || (newDir === 'DOWN' && direction !== 'UP')) {
                nextDirection = newDir;
            }
        }

        let touchStart = null;
        function handleTouchStart(e) { e.preventDefault(); const r = canvas.getBoundingClientRect(); touchStart = { x: e.touches[0].clientX - r.left, y: e.touches[0].clientY - r.top }; }
        function handleTouchMove(e) {
            e.preventDefault();
            if (!touchStart || !gameRunning || isPaused) return;
            const r = canvas.getBoundingClientRect();
            const dx = (e.touches[0].clientX - r.left) - touchStart.x;
            const dy = (e.touches[0].clientY - r.top) - touchStart.y;
            if (Math.abs(dx) < 12 && Math.abs(dy) < 12) return;
            setDirection(Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'RIGHT' : 'LEFT') : (dy > 0 ? 'DOWN' : 'UP'));
            touchStart = null;
        }

        function fullRestart() {
            if (gameLoopId) cancelAnimationFrame(gameLoopId);
            initGame(true);
            startGameLoop();
            gameOverModal.classList.remove('active');
            settingsModal.classList.remove('active');
        }

        function applySettings() {
            GRID_SIZE = Math.min(35, Math.max(10, parseInt(gridSizeSlider.value, 10)));
            gameSpeed = 70 + 220 - parseInt(speedSlider.value, 10);
            updateCellSize();
            fullRestart();
        }

        // ------------------- ПРИВЯЗКА СОБЫТИЙ -------------------
        document.getElementById('saveNameBtn').onclick = () => {
            setPlayerName(document.getElementById('playerNameInput').value);
        };
        document.getElementById('closeNameModal').onclick = () => {
            setPlayerName('Игрок');
        };
        document.getElementById('openLeaderboardBtn').onclick = () => {
            showLeaderboard();
            document.getElementById('leaderboardModal').classList.add('active');
        };
        document.getElementById('closeLeaderboardModal').onclick = () => document.getElementById('leaderboardModal').classList.remove('active');
        document.getElementById('refreshLeaderboardBtn').onclick = showLeaderboard;
        document.getElementById('openSettingsBtn').onclick = () => {
            if (gameRunning && !isPaused) { isPaused = true; }
            gridSizeSlider.value = GRID_SIZE; gridSizeValueSpan.innerText = GRID_SIZE;
            speedSlider.value = 70 + 220 - gameSpeed; speedValueSpan.innerText = gameSpeed;
            settingsModal.classList.add('active');
        };
        document.getElementById('applySettingsBtn').onclick = applySettings;
        document.getElementById('resetSettingsBtn').onclick = () => {
            gridSizeSlider.value = DEFAULT_GRID; speedSlider.value = 70 + 220 - DEFAULT_SPEED;
            applySettings();
        };
        document.getElementById('restartFromDeathBtn').onclick = fullRestart;
        document.getElementById('closeGameOverModal').onclick = () => gameOverModal.classList.remove('active');
        document.getElementById('closeSettingsModal').onclick = () => {
            settingsModal.classList.remove('active');
            if (gameRunning && isPaused) isPaused = false;
        };

        canvas.addEventListener('touchstart', handleTouchStart, {passive: false});
        canvas.addEventListener('touchmove', handleTouchMove, {passive: false});
        canvas.addEventListener('touchend', e => e.preventDefault());
        window.addEventListener('keydown', e => {
            const key = e.key;
            if (gameRunning && !isPaused) {
                const map = { 'ArrowUp':'UP','ArrowDown':'DOWN','ArrowLeft':'LEFT','ArrowRight':'RIGHT',
                              'w':'UP','W':'UP','s':'DOWN','S':'DOWN','a':'LEFT','A':'LEFT','d':'RIGHT','D':'RIGHT',
                              'ц':'UP','Ц':'UP','ы':'DOWN','Ы':'DOWN','ф':'LEFT','Ф':'LEFT','в':'RIGHT','В':'RIGHT' };
                if (map[key]) { e.preventDefault(); setDirection(map[key]); return; }
            }
            if (key === 'Escape') {
                if (settingsModal.classList.contains('active')) { settingsModal.classList.remove('active'); if (isPaused) isPaused = false; }
                else { if (gameRunning && !isPaused) isPaused = true; settingsModal.classList.add('active'); }
            }
            if (key === 'Enter' || key === ' ') { e.preventDefault(); if (gameOverModal.classList.contains('active')) fullRestart(); }
        });
        document.querySelectorAll('.ctrl-btn').forEach(b => b.addEventListener('click', e => setDirection(b.dataset.dir)));
        gridSizeSlider.oninput = () => gridSizeValueSpan.innerText = gridSizeSlider.value;
        speedSlider.oninput = () => speedValueSpan.innerText = 70 + 220 - speedSlider.value;

        // Старт
        updateCellSize();
        initGame(true);
        startGameLoop();
        initPlayer();
        checkServerStatus();
    })();
</script>
</body>
</html>
